# The provider's SA (InjectedIdentity) must be allowed to manage the CAPI objects it
# applies on behalf of the Composition. Scoped to the four CAPI apiGroups (+ a few core
# kinds CAPK touches) rather than cluster-admin.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-kubernetes-capi
rules:
  - apiGroups:
      - cluster.x-k8s.io
      - infrastructure.cluster.x-k8s.io
      - bootstrap.cluster.x-k8s.io
      - controlplane.cluster.x-k8s.io
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["namespaces", "secrets", "configmaps", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-kubernetes-capi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: provider-kubernetes-capi
subjects:
  - kind: ServiceAccount
    name: provider-kubernetes
    namespace: crossplane-system
