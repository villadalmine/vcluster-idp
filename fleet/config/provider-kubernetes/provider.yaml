# provider-kubernetes: lets a Crossplane Composition create a CAPI object WRAPPED in an
# Object (spec.forProvider.manifest) instead of composing it directly. The Object is what
# the HostCluster XR controller-owns; the CAPI object inside gets NO Crossplane ownerRef,
# so CAPI's own controllers can take ownership and the cluster tree reconciles.
# v1.0.0+ ships the Crossplane-v2 namespaced API group kubernetes.m.crossplane.io.
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-kubernetes
spec:
  package: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes:v1.2.1
  runtimeConfigRef:
    apiVersion: pkg.crossplane.io/v1beta1
    kind: DeploymentRuntimeConfig
    name: provider-kubernetes
---
# Pin the provider's ServiceAccount name so the ClusterRoleBinding below can target it.
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-kubernetes
spec:
  serviceAccountTemplate:
    metadata:
      name: provider-kubernetes
---
# Cluster-scoped config so the Object (composed into the `fleet` namespace) can reference
# it. InjectedIdentity = the provider acts in-cluster as its own ServiceAccount.
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: ClusterProviderConfig
metadata:
  name: kubernetes-provider
spec:
  credentials:
    source: InjectedIdentity
