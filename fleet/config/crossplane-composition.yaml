# Crossplane v2 Composition — composes the Cluster API + KubeVirt objects DIRECTLY
# (no provider-kubernetes shim). XRD moved to /v2; Composition stays /v1.
# Names derive from the XR name so refs line up: <xr>, <xr>-control-plane, <xr>-md-0.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: hostcluster-kubevirt
spec:
  compositeTypeRef:
    apiVersion: fleet.homelab.io/v1alpha1
    kind: HostCluster
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:

          - name: cluster
            base:
              apiVersion: cluster.x-k8s.io/v1beta1
              kind: Cluster
              spec:
                clusterNetwork:
                  pods: { cidrBlocks: ["10.243.0.0/16"] }
                  services: { cidrBlocks: ["10.95.0.0/16"] }
                controlPlaneRef:
                  apiVersion: controlplane.cluster.x-k8s.io/v1beta1
                  kind: KubeadmControlPlane
                infrastructureRef:
                  apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
                  kind: KubevirtCluster
            patches:
              - { type: FromCompositeFieldPath, fromFieldPath: metadata.name, toFieldPath: metadata.name }
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.controlPlaneRef.name
                transforms: [{ type: string, string: { type: Format, fmt: "%s-control-plane" } }]
              - { type: FromCompositeFieldPath, fromFieldPath: metadata.name, toFieldPath: spec.infrastructureRef.name }
              - { type: ToCompositeFieldPath, fromFieldPath: metadata.name, toFieldPath: status.clusterName }

          - name: kubevirtcluster
            base:
              apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
              kind: KubevirtCluster
              spec:
                controlPlaneServiceTemplate:
                  spec:
                    type: ClusterIP
            patches:
              - { type: FromCompositeFieldPath, fromFieldPath: metadata.name, toFieldPath: metadata.name }

          - name: controlplane
            base:
              apiVersion: controlplane.cluster.x-k8s.io/v1beta1
              kind: KubeadmControlPlane
              spec:
                machineTemplate:
                  infrastructureRef:
                    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
                    kind: KubevirtMachineTemplate
                kubeadmConfigSpec:
                  clusterConfiguration:
                    networking: { dnsDomain: cluster.local }
                  initConfiguration:
                    nodeRegistration:
                      criSocket: /var/run/containerd/containerd.sock
                      kubeletExtraArgs: {}
                  joinConfiguration:
                    nodeRegistration:
                      criSocket: /var/run/containerd/containerd.sock
                      kubeletExtraArgs: {}
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.name
                transforms: [{ type: string, string: { type: Format, fmt: "%s-control-plane" } }]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.machineTemplate.infrastructureRef.name
                transforms: [{ type: string, string: { type: Format, fmt: "%s-control-plane" } }]
              - { type: FromCompositeFieldPath, fromFieldPath: spec.controlPlaneReplicas, toFieldPath: spec.replicas }
              - { type: FromCompositeFieldPath, fromFieldPath: spec.kubernetesVersion, toFieldPath: spec.version }

          - name: cp-machinetemplate
            base:
              apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
              kind: KubevirtMachineTemplate
              spec:
                template:
                  spec:
                    virtualMachineTemplate:
                      spec:
                        runStrategy: Always
                        template:
                          spec:
                            evictionStrategy: External
                            domain:
                              cpu: { cores: 2 }
                              memory: { guest: 4Gi }
                              devices:
                                disks:
                                  - name: containervolume
                                    disk: { bus: virtio }
                            volumes:
                              - name: containervolume
                                containerDisk:
                                  image: quay.io/capk/ubuntu-2404-container-disk:v1.31.0
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.name
                transforms: [{ type: string, string: { type: Format, fmt: "%s-control-plane" } }]
              - { type: FromCompositeFieldPath, fromFieldPath: spec.cpuCores, toFieldPath: spec.template.spec.virtualMachineTemplate.spec.template.spec.domain.cpu.cores }
              - { type: FromCompositeFieldPath, fromFieldPath: spec.memory, toFieldPath: spec.template.spec.virtualMachineTemplate.spec.template.spec.domain.memory.guest }
              - { type: FromCompositeFieldPath, fromFieldPath: spec.nodeImage, toFieldPath: spec.template.spec.virtualMachineTemplate.spec.template.spec.volumes[0].containerDisk.image }
              - { type: FromCompositeFieldPath, fromFieldPath: spec.vmNodeHostname, toFieldPath: spec.template.spec.virtualMachineTemplate.spec.template.spec.nodeSelector["kubernetes.io/hostname"] }

          - name: machinedeployment
            base:
              apiVersion: cluster.x-k8s.io/v1beta1
              kind: MachineDeployment
              spec:
                selector:
                  matchLabels: {}
                template:
                  spec:
                    bootstrap:
                      configRef:
                        apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
                        kind: KubeadmConfigTemplate
                    infrastructureRef:
                      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
                      kind: KubevirtMachineTemplate
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.name
                transforms: [{ type: string, string: { type: Format, fmt: "%s-md-0" } }]
              - { type: FromCompositeFieldPath, fromFieldPath: metadata.name, toFieldPath: spec.clusterName }
              - { type: FromCompositeFieldPath, fromFieldPath: metadata.name, toFieldPath: spec.template.spec.clusterName }
              - { type: FromCompositeFieldPath, fromFieldPath: spec.workerReplicas, toFieldPath: spec.replicas }
              - { type: FromCompositeFieldPath, fromFieldPath: spec.kubernetesVersion, toFieldPath: spec.template.spec.version }
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.template.spec.bootstrap.configRef.name
                transforms: [{ type: string, string: { type: Format, fmt: "%s-md-0" } }]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.template.spec.infrastructureRef.name
                transforms: [{ type: string, string: { type: Format, fmt: "%s-md-0" } }]

          - name: md-machinetemplate
            base:
              apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
              kind: KubevirtMachineTemplate
              spec:
                template:
                  spec:
                    virtualMachineTemplate:
                      spec:
                        runStrategy: Always
                        template:
                          spec:
                            evictionStrategy: External
                            domain:
                              cpu: { cores: 2 }
                              memory: { guest: 4Gi }
                              devices:
                                disks:
                                  - name: containervolume
                                    disk: { bus: virtio }
                            volumes:
                              - name: containervolume
                                containerDisk:
                                  image: quay.io/capk/ubuntu-2404-container-disk:v1.31.0
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.name
                transforms: [{ type: string, string: { type: Format, fmt: "%s-md-0" } }]
              - { type: FromCompositeFieldPath, fromFieldPath: spec.cpuCores, toFieldPath: spec.template.spec.virtualMachineTemplate.spec.template.spec.domain.cpu.cores }
              - { type: FromCompositeFieldPath, fromFieldPath: spec.memory, toFieldPath: spec.template.spec.virtualMachineTemplate.spec.template.spec.domain.memory.guest }
              - { type: FromCompositeFieldPath, fromFieldPath: spec.nodeImage, toFieldPath: spec.template.spec.virtualMachineTemplate.spec.template.spec.volumes[0].containerDisk.image }
              - { type: FromCompositeFieldPath, fromFieldPath: spec.vmNodeHostname, toFieldPath: spec.template.spec.virtualMachineTemplate.spec.template.spec.nodeSelector["kubernetes.io/hostname"] }

          - name: md-bootstrap
            base:
              apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
              kind: KubeadmConfigTemplate
              spec:
                template:
                  spec:
                    joinConfiguration:
                      nodeRegistration:
                        criSocket: /var/run/containerd/containerd.sock
                        kubeletExtraArgs: {}
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.name
                transforms: [{ type: string, string: { type: Format, fmt: "%s-md-0" } }]
