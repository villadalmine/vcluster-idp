# Crossplane v2 XRD — the HostCluster API. v2: apiextensions/v2, scope Namespaced,
# NO claim (the namespaced HostCluster XR is the user-facing request).
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: hostclusters.fleet.homelab.io
spec:
  scope: Namespaced
  group: fleet.homelab.io
  names:
    kind: HostCluster
    plural: hostclusters
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                kubernetesVersion: { type: string, default: "v1.31.5" }
                controlPlaneReplicas: { type: integer, default: 1 }
                workerReplicas: { type: integer, default: 1 }
                cpuCores: { type: integer, default: 2 }
                memory: { type: string, default: "4Gi" }
                vmNodeHostname: { type: string, default: "srv-t7910" }
                nodeArch: { type: string, default: "amd64" }   # VMI architecture; must match the pinned node's kubernetes.io/arch (KubeVirt won't infer it)
                cni: { type: string, default: "calico" }        # which CNI the ClusterResourceSet injects: "calico" (dev) or "cilium" (acc/prod)
                role: { type: string, default: "host" }          # "host" (plain workload) or "management" (CAAPH HelmChartProxy installs ArgoCD into it)
                region: { type: string, default: "" }            # when set + role=management, the seeded ArgoCD gets a region-root pointing at clusters/regions/<region>/apps
                nodeImage:
                  type: string
                  default: "quay.io/capk/ubuntu-2404-container-disk:v1.31.5"
                diskSize: { type: string, default: "30Gi" }     # VM disk = DataVolume on longhorn-vm. Thin-provisioned (a ceiling, not a reservation). 30Gi is comfortable for 1-2 tenants; raise per-cluster if more.
                cpInitTimeout: { type: string }                  # kubeadm wait-control-plane timeout (e.g. "10m0s"). NO default on purpose: if unset, the Optional patch does not touch the KCP → other clusters do NOT roll. Raise only on slow-boot clusters (DataVolume) that take >4m.
              required: [kubernetesVersion]
            status:
              type: object
              properties:
                clusterName: { type: string }
