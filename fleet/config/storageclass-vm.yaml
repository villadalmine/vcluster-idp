# StorageClass for the VM DISKS (on the management = the hypervisor). Longhorn over the rk1
# NVMe disks (diskSelector: nvme → /mnt/nvme, not the eMMC default-disk).
# REPLICA 2 on purpose: host clusters are GitOps-recreatable, they don't need 3 copies
# → doubles the usable capacity (~877 GB → ~21 VMs of 40 GB).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-vm
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "2"
  diskSelector: "nvme"
  fsType: ext4
  staleReplicaTimeout: "2880"
