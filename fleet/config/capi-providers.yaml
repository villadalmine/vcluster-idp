# Declarative CAPI providers (Cluster API Operator reconciles these into the same
# CRDs + controllers that `clusterctl init` installs imperatively). This is the
# GitOps install of CAPI: edit a version + let ArgoCD sync = upgrade.
# Provider namespaces (clusterctl creates these; the GitOps operator does not, so we
# declare them). sync-wave "-1" → applied in an earlier phase than the Provider CRs
# (wave 0), so the namespaces exist before the namespaced providers land.
---
apiVersion: v1
kind: Namespace
metadata:
  name: capi-system
  annotations: { argocd.argoproj.io/sync-wave: "-1" }
---
apiVersion: v1
kind: Namespace
metadata:
  name: capi-kubeadm-bootstrap-system
  annotations: { argocd.argoproj.io/sync-wave: "-1" }
---
apiVersion: v1
kind: Namespace
metadata:
  name: capi-kubeadm-control-plane-system
  annotations: { argocd.argoproj.io/sync-wave: "-1" }
---
apiVersion: v1
kind: Namespace
metadata:
  name: capk-system
  annotations: { argocd.argoproj.io/sync-wave: "-1" }
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: CoreProvider
metadata:
  name: cluster-api
  namespace: capi-system
spec: {}                 # version: "v1.11.0"
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: BootstrapProvider
metadata:
  name: kubeadm
  namespace: capi-kubeadm-bootstrap-system
spec: {}
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: ControlPlaneProvider
metadata:
  name: kubeadm
  namespace: capi-kubeadm-control-plane-system
spec: {}
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: InfrastructureProvider
metadata:
  name: kubevirt
  namespace: capk-system
spec:
  # CAPK v0.10.5 = last v1beta1 contract (CAPI v1.10.x). v0.11.x pulls CAPI v1.11.1
  # (v1beta2) which the operator (installing core v1.10.10) rejects: CAPIVersionIncompatibility.
  version: "v0.10.5"
