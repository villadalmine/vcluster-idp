# Crossplane v2 plumbing: the patch-and-transform Function (native patch&transform was
# removed in v2). The CAPI objects are no longer composed directly — they are wrapped in
# provider-kubernetes Objects (see crossplane-composition.yaml), and that provider's SA
# carries the CAPI RBAC (fleet/config/provider-kubernetes/rbac.yaml). So the old
# aggregated CAPI ClusterRole on Crossplane's own SA is gone.
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-patch-and-transform
spec:
  # v2 requires a fully-qualified package image. Verify latest tag on the repo releases.
  package: xpkg.crossplane.io/crossplane-contrib/function-patch-and-transform:v0.9.0
