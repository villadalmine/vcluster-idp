# CDI (Containerized Data Importer) — importa la cloud-image de la VM a un PVC (Longhorn),
# para que el disco de la VM sea un volumen de red (no el containerDisk efímero). Companion
# de KubeVirt. v1.64.0 alineado con KubeVirt v1.8.0.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/kubevirt/containerized-data-importer/releases/download/v1.64.0/cdi-operator.yaml
  - cdi-cr.yaml
