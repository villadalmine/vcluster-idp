# CDI (Containerized Data Importer) — imports the VM cloud image into a PVC (Longhorn),
# so the VM disk is a network volume (not the ephemeral containerDisk). Companion
# to KubeVirt. v1.64.0 aligned with KubeVirt v1.8.0.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/kubevirt/containerized-data-importer/releases/download/v1.64.0/cdi-operator.yaml
  - cdi-cr.yaml
