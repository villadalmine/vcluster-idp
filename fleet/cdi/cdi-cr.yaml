# The CR that enables CDI (the operator reconciles it in the dataplane).
apiVersion: cdi.kubevirt.io/v1beta1
kind: CDI
metadata:
  name: cdi
spec:
  imagePullPolicy: IfNotPresent
  config:
    # respects the SC's WaitForFirstConsumer (Longhorn provisions where the VM runs)
    featureGates:
      - HonorWaitForFirstConsumer
