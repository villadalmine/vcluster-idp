# Child app of platform-root: applies the homelab HostCluster REQUESTS (XRs) from
# clusters/homelab/. Separate from the OpenStack example + bootstrap-crs (those are
# code/ADR, not auto-applied). sync-wave 5 → after the XRD/Composition (fleet-config).
# In a fleet this would be an ApplicationSet (like hosts-appset) generating one per env.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fleet-hostclusters
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/villadalmine/vcluster-idp.git
    targetRevision: HEAD
    path: clusters/homelab
  destination:
    server: https://kubernetes.default.svc
    namespace: fleet
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true   # the HostCluster CRD appears via fleet-config
  # Benign OutOfSync: the CAPI defaulting webhook mutates the MachineHealthCheck AFTER the apply.
  # Those fields aren't in Git (client-side apply, manager argocd-controller) -> permanent cosmetic diff even if
  # the MHC is healthy (currentHealthy 1/1, RemediationAllowed). We ignore only what CAPI injects/normalizes:
  #   - maxUnhealthy: the webhook defaults it to "100%" (we deliberately don't set it in Git, see the manifest).
  #   - nodeStartupTimeout / unhealthyConditions: CAPI normalizes the durations (25m->25m0s, 900s->15m0s).
  ignoreDifferences:
    - group: cluster.x-k8s.io
      kind: MachineHealthCheck
      jsonPointers:
        - /spec/maxUnhealthy
        - /spec/nodeStartupTimeout
        - /spec/unhealthyConditions
