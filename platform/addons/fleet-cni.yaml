# Child app of platform-root: empaqueta el CNI (Calico) como ConfigMap + ClusterResourceSet
# on the management. CAPI (via the CRS) injects it into each workload cluster labeled cni=calico
# when born -> nodes go from NotReady to Ready. sync-wave 4 -> after fleet-config
# (wave 3, which brings the Provider CRs/CRS CRD) and before/with the HostClusters (wave 5).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fleet-cni
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/villadalmine/vcluster-idp.git
    targetRevision: HEAD
    path: clusters/cni          # kustomize: CRS + ConfigMap(calico.yaml)
  destination:
    server: https://kubernetes.default.svc
    namespace: fleet
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - ServerSideApply=true     # the Calico ConfigMap is large; SSA avoids the last-applied annotation size limit
