# Child app of platform-root: CDI (VM disk importer). Lets the VM disk be a
# DataVolume on Longhorn (the "vSAN") instead of the ephemeral containerDisk. sync-wave 1
# (with kubevirt/crossplane/operator).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cdi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/villadalmine/vcluster-idp.git
    targetRevision: HEAD
    path: fleet/cdi
  destination:
    server: https://kubernetes.default.svc
    namespace: cdi
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true          # CDI's CRDs are large
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true # selfHeal doesn't fight the schema the cdi-operator rewrites
  # Benign OutOfSync: the cdi-operator co-owns the cdis.cdi.kubevirt.io CRD. ArgoCD applies via SSA and
  # only owns spec.group/names/scope; the operator manages spec.versions and rewrites/normalizes the
  # openAPIV3Schema (CRD ~89KB) tras el apply -> diff permanente aunque CDI funcione. En vez de listar
  # fragile schema pointers, we ignore by OWNER: everything the cdi-operator field-manager manages.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: cdis.cdi.kubevirt.io
      managedFieldsManagers:
        - cdi-operator
