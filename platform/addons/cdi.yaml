# Child app of platform-root: CDI (importer de discos de VM). Permite que el disco de la VM
# sea un DataVolume sobre Longhorn (el "vSAN") en vez del containerDisk efímero. sync-wave 1
# (con kubevirt/crossplane/operator).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cdi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/villadalmine/vcluster-idp.git
    targetRevision: HEAD
    path: fleet/cdi
  destination:
    server: https://kubernetes.default.svc
    namespace: cdi
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true          # los CRDs de CDI son grandes
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true # selfHeal no pelea con el schema que reescribe cdi-operator
  # OutOfSync benigno: el cdi-operator es co-dueño del CRD cdis.cdi.kubevirt.io. ArgoCD aplica vía SSA y
  # sólo posee spec.group/names/scope; el operator gestiona spec.versions y reescribe/normaliza el
  # openAPIV3Schema (CRD ~89KB) tras el apply -> diff permanente aunque CDI funcione. En vez de listar
  # punteros frágiles del schema, ignoramos por OWNER: todo lo que gestione el field-manager cdi-operator.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: cdis.cdi.kubevirt.io
      managedFieldsManagers:
        - cdi-operator
