# Child app of platform-root: the "management" wiring — the HelmChartProxy that
# installs ArgoCD on role=management clusters (CAAPH applies it in the workload).
# sync-wave 4 -> after fleet-config (wave 3, which installs CAAPH via the AddonProvider) and
# alongside fleet-cni; before/with the HostClusters (wave 5).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fleet-management
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/villadalmine/vcluster-idp.git
    targetRevision: HEAD
    path: clusters/management
  destination:
    server: https://kubernetes.default.svc
    namespace: fleet
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true   # the HelmChartProxy CRD appears once CAAPH installs
      - RespectIgnoreDifferences=true      # selfHeal doesn't revert the ignored fields (co-owner CAAPH)
  # Benign OutOfSync: CAAPH (the addon-provider) co-owns the HelmChartProxy's spec.options. After the
  # apply rellena sus defaults (enableClientCache:false, upgrade.maxHistory:10, reconcileStrategy) y
  # it normalizes the timeout (15m->15m0s). In Git we only set install.createNamespace/timeout/wait, so
  # those defaults show up as a diff even though both HelmChartProxies are Ready=True. We ignore spec.options.
  ignoreDifferences:
    - group: addons.cluster.x-k8s.io
      kind: HelmChartProxy
      jsonPointers:
        - /spec/options
