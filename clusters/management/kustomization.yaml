# fleet-management (path clusters/management) lo renderiza con kustomize:
#   - el HelmChartProxy que instala ArgoCD en los clusters role=management
#   - el ClusterResourceSet que siembra el region-root de eu-west1
#   - un ConfigMap (region-root-eu-west1) cuyo contenido ES el Application region-root
# region-root-eu-west1.yaml NO se aplica directo (kustomize lo consume como dato del generator),
# así el region-root sólo se inyecta en el cluster regional vía el CRS, no en el management.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fleet
resources:
  - helmchartproxy-argocd.yaml        # CAAPH → ArgoCD en role in (management,regional)
  - helmchartproxy-certmanager.yaml   # CAAPH → cert-manager en role=management (prereq del CAPI operator)
  - helmchartproxy-capi.yaml          # CAAPH → CAPI en role=management (Fase 2: host-mgmt crea clusters)
  - region-root-crs.yaml
  - mgmt-child-rbac.yaml              # Fase 2: SA+RBAC en el Root para el external-infra del CAPK de host-mgmt
  - mgmt-child-infra-job.yaml         # Fase 2: CronJob que crea el secret kubeconfig en host-mgmt (credencial)
  - mgmt-child-crs.yaml               # Fase 2: siembra los manifests del child en host-mgmt
configMapGenerator:
  - name: region-root-eu-west1
    files:
      - region-root-eu-west1.yaml
  - name: mgmt-child-cluster          # los manifests del child (los aplica el CRS en host-mgmt, NO en el Root)
    files:
      - mgmt-child-cluster.yaml
generatorOptions:
  disableNameSuffixHash: true   # el CRS referencia el ConfigMap por nombre exacto
