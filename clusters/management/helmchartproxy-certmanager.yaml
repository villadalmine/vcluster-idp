# cert-manager = a fleet PLATFORM SERVICE: installed in ALL clusters (management AND regional/host),
# like ArgoCD. Used by: the management for the CAPI operator's webhook (Certificates), and the
# regional/host clusters for their tenants' Gateway TLS. Installed separately (not as a subchart of the CAPI
# operator) because the operator templates its own Certificate and needs cert-manager's CRDs ALREADY
# registered; in the same release that races ("no matches for kind Certificate"). CAAPH retries the
# operator until cert-manager is ready.
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: cert-manager
  namespace: fleet
spec:
  clusterSelector:
    matchExpressions:
      - { key: platform.idp/role, operator: In, values: [management, regional] }
  repoURL: https://charts.jetstack.io
  chartName: cert-manager
  version: "v1.16.2"
  releaseName: cert-manager
  namespace: cert-manager
  options:
    install:
      createNamespace: true
    timeout: 10m
    wait: true
  valuesTemplate: |
    crds:
      enabled: true     # installs cert-manager's CRDs (Certificate, Issuer, etc.)
