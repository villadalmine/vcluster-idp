# The eu-west1 "region-root": an app-of-apps SEEDED into the regional cluster's ArgoCD
# (not applied on the management). Points DIRECTLY at the SHARED base clusters/regions/_base and
# sets the region via kustomize.patches (REGION → eu-west1). It is the ONLY per-region piece: adding
# a region = copy this file changing "eu-west1". See clusters/regions/README.md
# NOT applied directly: kustomize packs it into the region-root-eu-west1 ConfigMap and the
# ClusterResourceSet injects it into the cluster labeled platform.idp/region=eu-west1.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: region-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/villadalmine/vcluster-idp.git
    targetRevision: HEAD
    path: clusters/regions/_base          # shared base; the region is set by the patch below
    kustomize:
      patches:
        - target: { group: argoproj.io, kind: ApplicationSet, name: vclusters-REGION }
          patch: |-
            - { op: replace, path: /metadata/name, value: vclusters-eu-west1 }
            - { op: replace, path: /spec/generators/0/git/files/0/path, value: "clusters/regions/eu-west1/tenants/**/*.yaml" }
            - { op: replace, path: /spec/template/metadata/labels/platform.idp~1region, value: eu-west1 }
        - target: { group: argoproj.io, kind: ApplicationSet, name: workloads-REGION }
          patch: |-
            - { op: replace, path: /metadata/name, value: workloads-eu-west1 }
            - { op: replace, path: /spec/generators/0/git/files/0/path, value: "clusters/regions/eu-west1/tenants/**/*.yaml" }
            - { op: replace, path: /spec/template/metadata/labels/platform.idp~1region, value: eu-west1 }
  destination:
    server: https://kubernetes.default.svc   # the regional cluster itself
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
