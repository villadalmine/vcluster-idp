# Siembra el region-root en el ArgoCD del cluster regional. ApplyOnce, reintenta hasta que el CRD
# Application exista (lo instala CAAPH). Una región = un CRS (matchLabels region=<r>) que inyecta el
# ConfigMap region-root-<r> (generado por kustomize). Lean demo: sólo eu-west1 (el regional vivo).
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: region-root-eu-west1
  namespace: fleet
spec:
  clusterSelector:
    matchLabels:
      platform.idp/region: eu-west1
  strategy: ApplyOnce
  resources:
    - name: region-root-eu-west1
      kind: ConfigMap
