# Seeds the region-root into the regional cluster's ArgoCD. ApplyOnce, retries until the Application
# CRD exists (installed by CAAPH). One region = one CRS (matchLabels region=<r>) that injects the
# region-root-<r> ConfigMap (generated by kustomize). Lean demo: only eu-west1 (the live regional).
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: region-root-eu-west1
  namespace: fleet
spec:
  clusterSelector:
    matchLabels:
      platform.idp/region: eu-west1
  strategy: ApplyOnce
  resources:
    - name: region-root-eu-west1
      kind: ConfigMap
