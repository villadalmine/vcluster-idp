# HelmChartProxy (CAAPH) — installs ArgoCD INTO each cluster labeled
# platform.idp/role=management, usando Helm. Es la forma CAPI-nativa de instalar un addon
# heavy addon into a workload (no ConfigMap/CRS size limit). CAAPH runs on the
# management, waits for the cluster to be ready, and applies the chart via its kubeconfig.
# This is how a "host cluster" becomes "management" (first rung: it now has its GitOps engine).
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: argocd
  namespace: fleet
spec:
  clusterSelector:
    # ArgoCD is installed on the management clusters (they run CAPI + self-manage) AND on the regional (workload
    # clusters that host their own tenants with decentralized GitOps). It NEVER places tenants on a
    # management: a management CREATES the workload that hosts the vClusters (see the canonical model).
    matchExpressions:
      - { key: platform.idp/role, operator: In, values: [management, regional] }
  repoURL: https://argoproj.github.io/argo-helm
  chartName: argo-cd
  # version: 7.8.2          # pin for reproducibility; without a pin, CAAPH installs the latest
  releaseName: argocd
  namespace: argocd
  options:
    install:
      createNamespace: true
  # Installs ArgoCD only. The "region-root" (per-region app-of-apps) is NOT seeded here:
  # the chart installs the Application CRD and an extraObjects that references it fails the helm
  # build ("ensure CRDs are installed first" — the CRD is not registered yet). So the
  # region-root is seeded by a ClusterResourceSet (region-root-crs.yaml), which retries until
  # the CRD exists. Decouples the seed from the helm-install timing.
  valuesTemplate: |
    crds:
      install: true
    configs:
      params:
        server.insecure: true   # homelab; behind a Gateway/ingress with TLS in prod
      cm:
        # Custom health-check for ClusterResourceSet. ArgoCD's default marks Progressing if the CRS
        # lacks the ResourcesApplied=True condition — but a CRS that matches NO cluster (an alternative
        # CNI declared as an option, e.g. calico-IPIP/cilium when the child uses calico-vxlan) never
        # gets it, and it dragged the child-cni app to Progressing forever. Here: Healthy if it
        # applied OR if it matches nothing (idle), and Degraded ONLY on a real failure (ResourcesApplied=False).
        "resource.customizations.health.addons.cluster.x-k8s.io_ClusterResourceSet": |
          hs = { status = "Healthy", message = "No matching clusters (unused CRS) — idle" }
          if obj.status ~= nil and obj.status.conditions ~= nil then
            for _, c in ipairs(obj.status.conditions) do
              if c.type == "ResourcesApplied" then
                if c.status == "True" then
                  hs.status = "Healthy"; hs.message = c.message or "ResourcesApplied"
                elseif c.status == "False" then
                  hs.status = "Degraded"; hs.message = c.message or "ResourcesApplied=False"
                end
              end
            end
          end
          return hs
