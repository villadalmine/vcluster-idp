# HelmChartProxy (CAAPH) — instala ArgoCD DENTRO de cada cluster con label
# platform.idp/role=management, usando Helm. Es la forma CAPI-nativa de instalar un addon
# pesado en un workload (sin el límite de tamaño de un ConfigMap/CRS). CAAPH corre en el
# management, espera a que el cluster esté listo, y aplica el chart vía su kubeconfig.
# Así un "host cluster" se vuelve "management" (primer escalón: ya tiene su motor GitOps).
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: argocd
  namespace: fleet
spec:
  clusterSelector:
    # ArgoCD se instala en los management (corren CAPI + se autogestionan) Y en los regional (workload
    # clusters que hospedan sus propios tenants con GitOps descentralizado). NUNCA pone tenants en un
    # management: un management CREA el workload que hospeda los vClusters (ver MODELO-CANONICO.md).
    matchExpressions:
      - { key: platform.idp/role, operator: In, values: [management, regional] }
  repoURL: https://argoproj.github.io/argo-helm
  chartName: argo-cd
  # version: 7.8.2          # pinear para reproducibilidad; sin pin, CAAPH instala el último
  releaseName: argocd
  namespace: argocd
  options:
    install:
      createNamespace: true
  # Sólo instala ArgoCD. El "region-root" (app-of-apps por región) NO se siembra acá:
  # el chart instala el CRD Application y un extraObjects que lo referencia falla en el build
  # de helm ("ensure CRDs are installed first" — el CRD aún no está registrado). Por eso el
  # region-root lo siembra un ClusterResourceSet (region-root-crs.yaml), que reintenta hasta que
  # el CRD exista. Desacopla el seed del timing del helm install.
  valuesTemplate: |
    crds:
      install: true
    configs:
      params:
        server.insecure: true   # homelab; detrás de un Gateway/ingress con TLS en prod
      cm:
        # Health-check custom para ClusterResourceSet. El default de ArgoCD marca Progressing si el CRS
        # no tiene la condición ResourcesApplied=True — pero un CRS que NO matchea ningún cluster (un CNI
        # alternativo declarado como opción, ej. calico-IPIP/cilium cuando el hijo usa calico-vxlan) nunca
        # la obtiene, y quedaba arrastrando la app child-cni a Progressing para siempre. Acá: Healthy si
        # aplicó O si no matchea (idle), y Degraded SÓLO ante un fallo real (ResourcesApplied=False).
        "resource.customizations.health.addons.cluster.x-k8s.io_ClusterResourceSet": |
          hs = { status = "Healthy", message = "No matching clusters (unused CRS) — idle" }
          if obj.status ~= nil and obj.status.conditions ~= nil then
            for _, c in ipairs(obj.status.conditions) do
              if c.type == "ResourcesApplied" then
                if c.status == "True" then
                  hs.status = "Healthy"; hs.message = c.message or "ResourcesApplied"
                elseif c.status == "False" then
                  hs.status = "Degraded"; hs.message = c.message or "ResourcesApplied=False"
                end
              end
            end
          end
          return hs
