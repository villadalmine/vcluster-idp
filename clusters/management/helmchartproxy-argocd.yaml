# HelmChartProxy (CAAPH) — instala ArgoCD DENTRO de cada cluster con label
# platform.idp/role=management, usando Helm. Es la forma CAPI-nativa de instalar un addon
# pesado en un workload (sin el límite de tamaño de un ConfigMap/CRS). CAAPH corre en el
# management, espera a que el cluster esté listo, y aplica el chart vía su kubeconfig.
# Así un "host cluster" se vuelve "management" (primer escalón: ya tiene su motor GitOps).
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: argocd
  namespace: fleet
spec:
  clusterSelector:
    matchLabels:
      platform.idp/role: management
  repoURL: https://argoproj.github.io/argo-helm
  chartName: argo-cd
  # version: 7.8.2          # pinear para reproducibilidad; sin pin, CAAPH instala el último
  releaseName: argocd
  namespace: argocd
  options:
    install:
      createNamespace: true
  # valuesTemplate se renderiza por-cluster con Go templating (.Cluster = el objeto Cluster de
  # CAPI). Si el cluster tiene label platform.idp/region, ArgoCD nace con un "region-root"
  # (app-of-apps) que apunta a clusters/regions/<region>/apps -> ahí está el ApplicationSet que
  # provisiona los vCluster de los tenants de ESA región, en el propio cluster (destino local).
  # Así el ArgoCD del management NO deploya tenants: cada cluster regional despliega los suyos.
  valuesTemplate: |
    crds:
      install: true
    configs:
      params:
        server.insecure: true   # homelab; detrás de un Gateway/ingress con TLS en prod
    {{- $region := index .Cluster.metadata.labels "platform.idp/region" }}
    {{- if $region }}
    extraObjects:
      - apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: region-root
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/villadalmine/vcluster-idp.git
            targetRevision: HEAD
            path: clusters/regions/{{ $region }}/apps
            directory:
              recurse: true
          destination:
            server: https://kubernetes.default.svc   # el propio cluster regional
            namespace: argocd
          syncPolicy:
            automated: { prune: true, selfHeal: true }
            syncOptions: [CreateNamespace=true]
    {{- end }}
