# Phase 3 (full recursion) — these 3 objects are SEEDED INTO host-mgmt (via the Root CRS
# mgmt-child-addons) and make host-mgmt deliver ArgoCD + a region-root to its child (mgmt-child),
# EXACTLY as the Root delivers them to its regionals, one rung down. Result: mgmt-child
# ends up with its OWN decentralized ArgoCD that deploys its own vCluster (no SPOF). namespace=default
# because the mgmt-child Cluster lives in default inside host-mgmt (HelmChartProxy/CRS select within their ns).
#
# 0) Child CNI (chicken-and-egg): mgmt-child CANNOT run its own ArgoCD without a CNI, so the CNI
#    must come from OUTSIDE, via host-mgmt, FIRST. This Application runs in host-mgmt's ArgoCD and applies
#    clusters/cni into its OWN default ns → creates the calico-vxlan-cni CRS in host-mgmt → its CRS controller
#    (CAPI core) seeds Calico into mgmt-child (label cni=calico-vxlan). Self-hosted calico-node (host-network)
#    bootstraps the CNI without needing a CNI (hence CRS, not the tigera-operator helm, which would need a CNI).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: child-cni
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/villadalmine/vcluster-idp.git
    targetRevision: HEAD
    path: clusters/cni
    kustomize:
      namespace: default     # the mgmt-child Cluster lives in default → the CRS must be in the same ns
  destination:
    server: https://kubernetes.default.svc   # host-mgmt itself
    namespace: default
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # Calico's CRDs are large
---
# 1) CAAPH: host-mgmt installs ArgoCD INTO mgmt-child (selector role=regional, same as the Root).
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: argocd
  namespace: default
spec:
  clusterSelector:
    matchLabels:
      platform.idp/role: regional
  repoURL: https://argoproj.github.io/argo-helm
  chartName: argo-cd
  releaseName: argocd
  namespace: argocd
  options:
    install:
      createNamespace: true
  valuesTemplate: |
    crds:
      install: true
    configs:
      params:
        server.insecure: true
---
# 2) ConfigMap that packs the child's region-root (the CRS below unpacks it into mgmt-child's ArgoCD).
#    The region-root points at the SAME shared base clusters/regions/_base and parametrizes it to region=mc-euw1
#    (mirror of the Root's region-root-eu-west1.yaml). This way the child provisions its own vCluster per tenant.
apiVersion: v1
kind: ConfigMap
metadata:
  name: region-root-mc-euw1
  namespace: default
data:
  region-root.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: region-root
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/villadalmine/vcluster-idp.git
        targetRevision: HEAD
        path: clusters/regions/_base
        kustomize:
          patches:
            - target: { group: argoproj.io, kind: ApplicationSet, name: vclusters-REGION }
              patch: |-
                - { op: replace, path: /metadata/name, value: vclusters-mc-euw1 }
                - { op: replace, path: /spec/generators/0/git/files/0/path, value: "clusters/regions/mc-euw1/tenants/**/*.yaml" }
                - { op: replace, path: /spec/template/metadata/labels/platform.idp~1region, value: mc-euw1 }
            - target: { group: argoproj.io, kind: ApplicationSet, name: workloads-REGION }
              patch: |-
                - { op: replace, path: /metadata/name, value: workloads-mc-euw1 }
                - { op: replace, path: /spec/generators/0/git/files/0/path, value: "clusters/regions/mc-euw1/tenants/**/*.yaml" }
                - { op: replace, path: /spec/template/metadata/labels/platform.idp~1region, value: mc-euw1 }
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
---
# 3) CRS INSIDE host-mgmt: seeds the region-root (ConfigMap above) into mgmt-child's ArgoCD.
#    ApplyOnce, retries until the Application CRD exists (installed by the CAAPH above). selector region=mc-euw1.
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: region-root-mc-euw1
  namespace: default
spec:
  clusterSelector:
    matchLabels:
      platform.idp/region: mc-euw1
  strategy: ApplyOnce
  resources:
    - name: region-root-mc-euw1
      kind: ConfigMap
