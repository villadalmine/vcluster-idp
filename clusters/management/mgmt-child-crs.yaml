# Seeds the CHILD cluster manifests into host-mgmt (role=management) — the GitOps version of the by-hand
# apply. The CRS injects the mgmt-child-cluster ConfigMap (generated from mgmt-child-cluster.yaml) → host-mgmt's
# CAPK processes it and creates the child's VMs on the Root's KubeVirt (via the mgmt-child-infra secret
# created by the mgmt-child-infra CronJob). ApplyOnce, retries until the CAPI CRDs exist in host-mgmt.
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: mgmt-child
  namespace: fleet
spec:
  clusterSelector:
    matchLabels:
      platform.idp/role: management
  strategy: Reconcile   # git = continuous source of truth (e.g. the Cluster's cni label propagates without recreating)
  resources:
    - name: mgmt-child-cluster
      kind: ConfigMap
