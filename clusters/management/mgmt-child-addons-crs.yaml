# Seeds the addons bundle (mgmt-child-addons.yaml) INTO host-mgmt (role=management) — the piece
# that makes the model "recursive": host-mgmt not only creates mgmt-child, it also delivers it its own ArgoCD
# (CAAPH) and its region-root (CRS), like the Root does for its regionals. ApplyOnce, retries until the
# CRDs (HelmChartProxy, ClusterResourceSet) exist in host-mgmt (installed by the CAPI operator + the helm addon).
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: mgmt-child-addons
  namespace: fleet
spec:
  clusterSelector:
    matchLabels:
      platform.idp/role: management
  strategy: Reconcile   # git = continuous source of truth: bundle changes (e.g. adding child-cni) propagate to host-mgmt
  resources:
    - name: mgmt-child-addons
      kind: ConfigMap
