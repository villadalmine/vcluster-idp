# Fase 2 (management-of-managements): instala Cluster API DENTRO de los clusters role=management
# (hoy host-mgmt) vía CAAPH/Helm — el mismo patrón con el que les instalamos ArgoCD. Así host-mgmt
# deja de ser sólo "tiene ArgoCD" y pasa a ser un MANAGEMENT de verdad: puede CREAR host clusters.
# El chart cluster-api-operator instala el operator + los providers (core/bootstrap/controlPlane +
# infra kubevirt) declarados por values, y su propio cert-manager (host-mgmt no tiene uno).
# El CAPK de host-mgmt creará las VMs del hijo sobre el KubeVirt del Root (external-infra; ver el
# manifest del hijo en clusters/management-child/). Selector role=management → NO toca los regional.
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: capi-operator
  namespace: fleet
spec:
  clusterSelector:
    matchLabels:
      platform.idp/role: management
  repoURL: https://kubernetes-sigs.github.io/cluster-api-operator
  chartName: cluster-api-operator
  version: "0.21.0"          # mismo pin que el Root (platform/addons/cluster-api-operator.yaml)
  releaseName: capi-operator
  namespace: capi-operator-system
  options:
    install:
      createNamespace: true
    timeout: 15m
    wait: true
  valuesTemplate: |
    cert-manager:
      enabled: false         # se instala por separado (helmchartproxy-certmanager.yaml) para evitar el
                             # race de CRDs; CAAPH reintenta este install hasta que cert-manager esté listo.
    # Schema del chart 0.21.0 (verificado con `helm show values`): providers = objetos keyed por nombre.
    core:
      cluster-api:
        version: v1.10.10
    bootstrap:
      kubeadm:
        version: v1.10.10
    controlPlane:
      kubeadm:
        version: v1.10.10
    infrastructure:
      kubevirt:
        version: v0.10.5     # CAPK v1beta1-contract (igual que el Root)
    addon:
      helm:
        version: v0.4.2      # CAAPH (HelmChartProxy) — host-mgmt instala ArgoCD EN su hijo (mgmt-child),
                             # igual que el Root lo instala en sus regionales. Recursión: el hijo termina
                             # con su PROPIO ArgoCD descentralizado (sin SPOF). v0.4.2 = último v1beta1-contract.
