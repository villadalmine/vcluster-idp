# Phase 2 (management-of-managements): installs Cluster API INTO the role=management clusters
# (today host-mgmt) via CAAPH/Helm — the same pattern used to install ArgoCD. This way host-mgmt
# goes from just "has ArgoCD" to a real MANAGEMENT: it can CREATE host clusters.
# The cluster-api-operator chart installs the operator + the providers (core/bootstrap/controlPlane +
# infra kubevirt) declared via values, and its own cert-manager (host-mgmt has none).
# host-mgmt's CAPK creates the child's VMs on the Root's KubeVirt (external-infra; see the
# child manifest in clusters/management/). Selector role=management → does NOT touch the regional clusters.
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: capi-operator
  namespace: fleet
spec:
  clusterSelector:
    matchLabels:
      platform.idp/role: management
  repoURL: https://kubernetes-sigs.github.io/cluster-api-operator
  chartName: cluster-api-operator
  version: "0.21.0"          # same pin as the Root (platform/addons/cluster-api-operator.yaml)
  releaseName: capi-operator
  namespace: capi-operator-system
  options:
    install:
      createNamespace: true
    timeout: 15m
    wait: true
  valuesTemplate: |
    cert-manager:
      enabled: false         # installed separately (helmchartproxy-certmanager.yaml) to avoid the
                             # CRD race; CAAPH retries this install until cert-manager is ready.
    # Chart 0.21.0 schema (verified with `helm show values`): providers = objects keyed by name.
    core:
      cluster-api:
        version: v1.10.10
    bootstrap:
      kubeadm:
        version: v1.10.10
    controlPlane:
      kubeadm:
        version: v1.10.10
    infrastructure:
      kubevirt:
        version: v0.10.5     # CAPK v1beta1-contract (same as the Root)
    addon:
      helm:
        version: v0.4.2      # CAAPH (HelmChartProxy) — host-mgmt installs ArgoCD IN its child (mgmt-child),
                             # same as the Root installs it on its regionals. Recursion: the child ends
                             # with its OWN decentralized ArgoCD (no SPOF). v0.4.2 = last v1beta1-contract.
