# CHILD cluster created by host-mgmt (management-of-managements). Applied IN host-mgmt; its CAPK creates the
# VMs on the Root's KubeVirt via external-infra (KubevirtCluster.spec.infraClusterSecretRef → secret
# mgmt-child-infra holding the kubeconfig to the Root). DataVolume on Longhorn (30Gi, avoids disk-pressure) + amd64/t7910.
# Validated by hand first; then served via GitOps (CRS → host-mgmt's ArgoCD).
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: mgmt-child
  namespace: default
  labels:
    # host-mgmt treats mgmt-child as a REGIONAL: its CAAPH installs ArgoCD (selector role=regional)
    # and its CRS seeds the region-root (selector region=mc-euw1). Mirrors the Root model one rung down.
    platform.idp/role: regional
    platform.idp/region: mc-euw1
    cni: calico-vxlan        # the calico-vxlan-cni CRS (created by host-mgmt's ArgoCD in its default ns) matches this and seeds the CNI
spec:
  clusterNetwork:
    pods:
      cidrBlocks: ["10.244.0.0/16"]
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: mgmt-child-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubevirtCluster
    name: mgmt-child
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtCluster
metadata:
  name: mgmt-child
  namespace: default
spec:
  infraClusterSecretRef:            # ← external-infra: the VMs are created on the Root (not on host-mgmt)
    apiVersion: v1
    kind: Secret
    name: mgmt-child-infra
    namespace: default
  controlPlaneServiceTemplate:
    spec:
      type: ClusterIP
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: mgmt-child-control-plane
  namespace: default
spec:
  replicas: 1
  version: v1.31.5
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
      kind: KubevirtMachineTemplate
      name: mgmt-child-control-plane
  kubeadmConfigSpec:
    clusterConfiguration:
      apiServer:
        timeoutForControlPlane: 10m0s
    initConfiguration:
      nodeRegistration:
        criSocket: unix:///var/run/containerd/containerd.sock
    joinConfiguration:
      nodeRegistration:
        criSocket: unix:///var/run/containerd/containerd.sock
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: mgmt-child-control-plane
  namespace: default
spec:
  template:
    spec:
      virtualMachineTemplate:
        metadata:
          namespace: mgmt-child           # ns on the Root where the VMs live (the SA/RBAC one)
        spec:
          runStrategy: Always
          # Disk = DataVolume (CDI imports the cloud image into a 30Gi Longhorn PVC). Replaces the
          # ephemeral containerDisk (~3Gi) that caused disk-pressure and evicted the child's vcluster pods.
          # Same pattern as the host clusters' Crossplane composition. CAPK prefixes the DV per machine.
          dataVolumeTemplates:
            - metadata: { name: boot-volume }
              spec:
                pvc:
                  accessModes: [ReadWriteOnce]
                  resources: { requests: { storage: 30Gi } }
                  storageClassName: longhorn-vm
                source:
                  registry:
                    url: "docker://quay.io/capk/ubuntu-2404-container-disk:v1.31.5"
          template:
            spec:
              architecture: amd64
              domain:
                cpu: { cores: 2 }
                memory: { guest: 4Gi }
                devices:
                  disks:
                    - { name: dv-volume, disk: { bus: virtio } }
                  # NO custom interfaces/networks: CAPK uses its default (bridge → unique pod IP per VM).
                  # Forcing masquerade puts ALL nodes on 10.0.2.2 → collision → calico can't route.
              evictionStrategy: External
              nodeSelector: { kubernetes.io/hostname: srv-t7910 }
              volumes:
                - name: dv-volume
                  dataVolume: { name: boot-volume }
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: mgmt-child-md-0
  namespace: default
spec:
  clusterName: mgmt-child
  replicas: 1
  selector:
    matchLabels: null
  template:
    spec:
      clusterName: mgmt-child
      version: v1.31.5
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: mgmt-child-md-0
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: KubevirtMachineTemplate
        name: mgmt-child-md-0
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: mgmt-child-md-0
  namespace: default
spec:
  template:
    spec:
      virtualMachineTemplate:
        metadata:
          namespace: mgmt-child
        spec:
          runStrategy: Always
          # Disk = DataVolume (CDI imports the cloud image into a 30Gi Longhorn PVC). Replaces the
          # ephemeral containerDisk (~3Gi) that caused disk-pressure and evicted the child's vcluster pods.
          # Same pattern as the host clusters' Crossplane composition. CAPK prefixes the DV per machine.
          dataVolumeTemplates:
            - metadata: { name: boot-volume }
              spec:
                pvc:
                  accessModes: [ReadWriteOnce]
                  resources: { requests: { storage: 30Gi } }
                  storageClassName: longhorn-vm
                source:
                  registry:
                    url: "docker://quay.io/capk/ubuntu-2404-container-disk:v1.31.5"
          template:
            spec:
              architecture: amd64
              domain:
                cpu: { cores: 2 }
                memory: { guest: 4Gi }
                devices:
                  disks:
                    - { name: dv-volume, disk: { bus: virtio } }
                  # NO custom interfaces/networks: CAPK uses its default (bridge → unique pod IP per VM).
                  # Forcing masquerade puts ALL nodes on 10.0.2.2 → collision → calico can't route.
              evictionStrategy: External
              nodeSelector: { kubernetes.io/hostname: srv-t7910 }
              volumes:
                - name: dv-volume
                  dataVolume: { name: boot-volume }
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: mgmt-child-md-0
  namespace: default
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          criSocket: unix:///var/run/containerd/containerd.sock
