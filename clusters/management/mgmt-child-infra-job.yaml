# Phase 2 GitOps — generates the external-infra credential WITHOUT any by-hand step (replaces the secret
# created manually). Declarative CronJob (vcluster-register pattern): builds the kubeconfig to the Root from the
# capk-mgmt-child SA token (in-cluster, never in git) and creates the mgmt-child-infra secret INSIDE
# host-mgmt. Idempotent + retries (waits until host-mgmt-kubeconfig and the token exist). Runs on
# the Root (applied by fleet-management). host-mgmt's CAPK uses that secret to create the child's VMs
# on the Root's KubeVirt.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mgmt-child-infra
  namespace: fleet
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mgmt-child-infra
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]    # read capk-mgmt-child-token (mgmt-child) + host-mgmt-kubeconfig (fleet)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mgmt-child-infra
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: mgmt-child-infra }
subjects:
  - { kind: ServiceAccount, name: mgmt-child-infra, namespace: fleet }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mgmt-child-infra
  namespace: fleet
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: mgmt-child-infra
          restartPolicy: Never
          containers:
            - name: gen
              image: alpine/k8s:1.31.5
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -eu
                  ROOT_API="https://192.168.178.130:6443"   # Root API reachable from host-mgmt (HAProxy VIP)
                  TOK="$(kubectl -n mgmt-child get secret capk-mgmt-child-token -o jsonpath='{.data.token}' 2>/dev/null | base64 -d || true)"
                  CA="$(kubectl -n mgmt-child get secret capk-mgmt-child-token -o jsonpath='{.data.ca\.crt}' 2>/dev/null || true)"
                  HM="$(kubectl -n fleet get secret host-mgmt-kubeconfig -o jsonpath='{.data.value}' 2>/dev/null | base64 -d || true)"
                  [ -n "$TOK" ] && [ -n "$CA" ] && [ -n "$HM" ] || { echo "waiting for token/host-mgmt-kubeconfig..."; exit 0; }
                  cat > /tmp/infra.kc <<EOF
                  apiVersion: v1
                  kind: Config
                  clusters: [{name: root, cluster: {server: ${ROOT_API}, certificate-authority-data: ${CA}}}]
                  contexts: [{name: c, context: {cluster: root, user: u, namespace: mgmt-child}}]
                  current-context: c
                  users: [{name: u, user: {token: ${TOK}}}]
                  EOF
                  printf '%s' "$HM" > /tmp/hm.kc
                  KUBECONFIG=/tmp/hm.kc kubectl create secret generic mgmt-child-infra -n default \
                    --from-file=kubeconfig=/tmp/infra.kc --dry-run=client -o yaml | KUBECONFIG=/tmp/hm.kc kubectl apply -f -
                  echo "mgmt-child-infra secret created/updated in host-mgmt"
