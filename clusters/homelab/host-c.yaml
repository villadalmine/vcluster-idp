# Host cluster host-c → REGIONAL management HA (region us-central1), 3 control-plane (etcd quórum 2/3).
# Rebuild con calico-vxlan: antes era cilium y el etcd HA NO formaba quórum entre las 3 VMs CP
# (apiservers READY 0/3, endpoint :6443 refused) — síntoma del masquerade de KubeVirt anidado sobre el
# tráfico peer cross-VM. VXLAN lo resuelve. Demuestra HA control-plane FUNCIONANDO. Ver README §3.1.
apiVersion: fleet.homelab.io/v1alpha1
kind: HostCluster
metadata:
  name: host-c
  namespace: fleet
  labels:
    env: prod
    region: us-central1
spec:
  crossplane:
    compositionRef:
      name: hostcluster-kubevirt
  kubernetesVersion: v1.31.5
  controlPlaneReplicas: 3        # HA: etcd quórum 2/3
  workerReplicas: 1
  cpuCores: 2
  memory: "4Gi"
  vmNodeHostname: srv-t7910
  nodeArch: amd64
  nodeImage: quay.io/capk/ubuntu-2404-container-disk:v1.31.5
  cni: calico-vxlan
  role: regional
  region: us-central1
  cpInitTimeout: "15m0s"
