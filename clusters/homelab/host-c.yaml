# Host cluster PROD. CNI = Cilium. control-plane HA (3 réplicas) = etcd con quórum 2/3.
# OJO: al pushear se crean VMs reales (3 CP + 1 worker) en t7910.
apiVersion: fleet.homelab.io/v1alpha1
kind: HostCluster
metadata:
  name: host-c
  namespace: fleet
  labels:
    env: prod
spec:
  crossplane:
    compositionRef:
      name: hostcluster-kubevirt
  kubernetesVersion: v1.31.5
  controlPlaneReplicas: 3        # HA: etcd quórum 2/3
  workerReplicas: 1
  cpuCores: 2
  memory: "4Gi"
  vmNodeHostname: srv-t7910
  nodeArch: amd64
  nodeImage: quay.io/capk/ubuntu-2404-container-disk:v1.31.5
  cni: cilium
