# Host cluster PROD. CNI = Cilium. controlPlaneReplicas debería ser 3 para HA real; en el
# homelab queda en 1 para no saturar srv-t7910 (subilo a 3 si hay recursos).
# OJO: al pushear se crean VMs reales (1 CP + 1 worker) en t7910.
apiVersion: fleet.homelab.io/v1alpha1
kind: HostCluster
metadata:
  name: host-c
  namespace: fleet
  labels:
    env: prod
spec:
  crossplane:
    compositionRef:
      name: hostcluster-kubevirt
  kubernetesVersion: v1.31.5
  controlPlaneReplicas: 1        # prod real = 3 (HA)
  workerReplicas: 1
  cpuCores: 2
  memory: "4Gi"
  vmNodeHostname: srv-t7910
  nodeArch: amd64
  nodeImage: quay.io/capk/ubuntu-2404-container-disk:v1.31.5
  cni: cilium
