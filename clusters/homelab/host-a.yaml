# Host cluster host-a → REGIONAL management (region us-east1). Rebuild con calico-vxlan.
# role=management → CAAPH le instala su propio ArgoCD; region=us-east1 → un region-root (sembrado por
# CRS) provisiona los vCluster de la región EN ESTE cluster (modelo descentralizado, como host-euw1).
# CNI: calico-vxlan — en KubeVirt anidado el masquerade rompe el overlay cross-VM de IPIP/Cilium
# (hipótesis validada en euw1); VXLAN (UDP 4789) lo resolvió end-to-end. Ver README §3.1.
apiVersion: fleet.homelab.io/v1alpha1
kind: HostCluster
metadata:
  name: host-a
  namespace: fleet
  labels:
    env: dev
    region: us-east1
spec:
  crossplane:
    compositionRef:
      name: hostcluster-kubevirt
  kubernetesVersion: v1.31.5
  controlPlaneReplicas: 1
  workerReplicas: 1
  cpuCores: 2
  memory: "4Gi"
  vmNodeHostname: srv-t7910
  nodeArch: amd64
  nodeImage: quay.io/capk/ubuntu-2404-container-disk:v1.31.5
  cni: calico-vxlan
  role: management
  region: us-east1
  cpInitTimeout: "15m0s"
