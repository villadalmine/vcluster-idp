# MachineHealthCheck (CAPI) — AUTOMATIC remediation of unhealthy Machines, instead of deleting
# virt-launchers by hand when a VM/node dies. Read by fleet-hostclusters (directory clusters/homelab).
#
# DESIGN (deliberate for this nested homelab, see README §3.2):
#  - SCOPED TO WORKERS (matchExpression control-plane DoesNotExist). We do NOT remediate the control-plane
#    automatically: recreating a CP mid-flap can strand the immutable controlPlaneEndpoint
#    (an incident already hit) — the KubeadmControlPlane has its own, more careful remediation.
#  - LONG TIMEOUTS (Ready Unknown/False @ 900s, nodeStartupTimeout 25m): the CP takes up to 15m to
#    boot on Longhorn; we don't want to remediate on a network blip (the LAN/nested net is flaky).
#  - No custom maxUnhealthy (default 100%): a dead worker is recreated on its own (the MachineDeployment
#    replaces it). NOTE: with a SINGLE hypervisor node, if the whole node dies ALL Machines drop at once
#    and remediation can't recreate until the node returns — in multi-node production you lower
#    maxUnhealthy (~40%) so a node failure only remediates its share and short-circuits
#    fleet-wide outages. Here we keep it to demonstrate the feature; the real SPOF fix is multi-node.
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineHealthCheck
metadata:
  name: host-euw1-workers
  namespace: fleet
spec:
  clusterName: host-euw1
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: host-euw1
    matchExpressions:
      - { key: cluster.x-k8s.io/control-plane, operator: DoesNotExist }
  nodeStartupTimeout: 25m
  unhealthyConditions:
    - { type: Ready, status: Unknown, timeout: 900s }
    - { type: Ready, status: "False", timeout: 900s }
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineHealthCheck
metadata:
  name: host-mgmt-workers
  namespace: fleet
spec:
  clusterName: host-mgmt
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: host-mgmt
    matchExpressions:
      - { key: cluster.x-k8s.io/control-plane, operator: DoesNotExist }
  nodeStartupTimeout: 25m
  unhealthyConditions:
    - { type: Ready, status: Unknown, timeout: 900s }
    - { type: Ready, status: "False", timeout: 900s }
