# MachineHealthCheck (CAPI) — remediación AUTOMÁTICA de Machines no-sanas, en vez de borrar
# virt-launchers a mano cuando una VM/nodo muere. Lo lee fleet-hostclusters (directorio clusters/homelab).
#
# DISEÑO (deliberado para este homelab anidado, ver README §3.1 y FALLO-NODO-RUNBOOK.md):
#  - SCOPED A WORKERS (matchExpression control-plane DoesNotExist). NO remediamos el control-plane
#    automáticamente: recrear un CP a mitad de un flap puede dejar un controlPlaneEndpoint inmutable
#    stale (incidente ya vivido) — el KubeadmControlPlane tiene su propia remediación más cuidadosa.
#  - TIMEOUTS LARGOS (Ready Unknown/False @ 900s, nodeStartupTimeout 25m): el CP tarda hasta 15m en
#    bootear sobre Longhorn; no queremos remediar por un blip de red (la LAN/anidado es flaky).
#  - Sin maxUnhealthy custom (default 100%): un worker muerto se recrea solo (la MachineDeployment lo
#    repone). OJO: con UN solo nodo hypervisor, si cae el nodo entero TODAS las Machines caen a la vez
#    y la remediación no puede recrear hasta que el nodo vuelva — en producción multi-nodo se baja
#    maxUnhealthy (~40%) para que un fallo de nodo remedie sólo su parte y corte cortocircuito ante
#    outages infra-wide. Acá lo dejamos demostrando el feature; el fix real del SPOF es multi-nodo.
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineHealthCheck
metadata:
  name: host-euw1-workers
  namespace: fleet
spec:
  clusterName: host-euw1
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: host-euw1
    matchExpressions:
      - { key: cluster.x-k8s.io/control-plane, operator: DoesNotExist }
  nodeStartupTimeout: 25m
  unhealthyConditions:
    - { type: Ready, status: Unknown, timeout: 900s }
    - { type: Ready, status: "False", timeout: 900s }
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineHealthCheck
metadata:
  name: host-mgmt-workers
  namespace: fleet
spec:
  clusterName: host-mgmt
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: host-mgmt
    matchExpressions:
      - { key: cluster.x-k8s.io/control-plane, operator: DoesNotExist }
  nodeStartupTimeout: 25m
  unhealthyConditions:
    - { type: Ready, status: Unknown, timeout: 900s }
    - { type: Ready, status: "False", timeout: 900s }
