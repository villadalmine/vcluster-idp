# Host cluster host-mgmt → management role (creates its own child). Built with calico-vxlan.
# It was cilium before: the worker never joined (NotReady) and the single CP kept its taint → the ArgoCD
# CAAPH installs couldn't schedule (redis-init Pending 25h). VXLAN fixes the cross-VM join. Demonstrates
# the "management-of-managements": a host promoted to management that creates + serves its own child.
apiVersion: fleet.homelab.io/v1alpha1
kind: HostCluster
metadata:
  name: host-mgmt
  namespace: fleet
  labels:
    env: dev
spec:
  crossplane:
    compositionRef:
      name: hostcluster-kubevirt
  kubernetesVersion: v1.31.5
  controlPlaneReplicas: 1
  workerReplicas: 1
  cpuCores: 2
  memory: "4Gi"
  vmNodeHostname: srv-t7910
  nodeArch: amd64
  nodeImage: quay.io/capk/ubuntu-2404-container-disk:v1.31.5
  cni: calico-vxlan
  role: management
  cpInitTimeout: "15m0s"
