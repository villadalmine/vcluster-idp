# Cluster REGIONAL eu-west1 (dev). role=management → CAAPH le instala su PROPIO ArgoCD; con
# region=eu-west1 ese ArgoCD nace con un region-root → clusters/regions/eu-west1/apps →
# provisiona los vCluster de los tenants de la región EN ESTE cluster (modelo descentralizado).
# CNI = Calico (Cilium no rutea ClusterIP/DNS en KubeVirt anidado — ver INCIDENTES §9).
# OJO: al pushear se crean VMs reales (1 CP + 1 worker) en t7910.
apiVersion: fleet.homelab.io/v1alpha1
kind: HostCluster
metadata:
  name: host-euw1
  namespace: fleet
  labels:
    env: dev
    region: eu-west1
spec:
  crossplane:
    compositionRef:
      name: hostcluster-kubevirt
  kubernetesVersion: v1.31.5
  controlPlaneReplicas: 1
  workerReplicas: 1
  cpuCores: 2
  memory: "4Gi"
  vmNodeHostname: srv-t7910
  nodeArch: amd64
  nodeImage: quay.io/capk/ubuntu-2404-container-disk:v1.31.5
  cni: calico
  role: management
  region: eu-west1
