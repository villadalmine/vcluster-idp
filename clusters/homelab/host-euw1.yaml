# REGIONAL cluster eu-west1 (dev). role=regional → CAAPH installs its OWN ArgoCD; with
# region=eu-west1 that ArgoCD is seeded with a region-root → clusters/regions/eu-west1 →
# provisions the region's tenant vClusters IN THIS cluster (decentralized model).
# CNI = Calico (Cilium no rutea ClusterIP/DNS en KubeVirt anidado — ver INCIDENTES §9).
# OJO: al pushear se crean VMs reales (1 CP + 1 worker) en t7910.
apiVersion: fleet.homelab.io/v1alpha1
kind: HostCluster
metadata:
  name: host-euw1
  namespace: fleet
  labels:
    env: dev
    region: eu-west1
spec:
  crossplane:
    compositionRef:
      name: hostcluster-kubevirt
  kubernetesVersion: v1.31.5
  controlPlaneReplicas: 1
  workerReplicas: 1
  cpuCores: 2
  memory: "4Gi"
  vmNodeHostname: srv-t7910
  nodeArch: amd64
  nodeImage: quay.io/capk/ubuntu-2404-container-disk:v1.31.5
  cni: calico-vxlan
  role: regional
  region: eu-west1
  # Slow boot: the euw1 VM boots from a DataVolume (Longhorn) on nested KubeVirt and its
  # control-plane takes >4m to come up. Without this, kubeadm times out at 4m in wait-control-plane
  # and init never completes upload-config/mark-control-plane/addons → CAPI stays in WaitingForKubeadmInit.
  cpInitTimeout: "15m0s"
