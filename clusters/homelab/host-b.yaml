# Host cluster host-b → REGIONAL management (region us-west1). Rebuild con calico-vxlan.
# Igual patrón que host-a/host-euw1: ArgoCD propio (CAAPH) + region-root → vClusters de la región.
# CNI calico-vxlan por el masquerade de KubeVirt anidado (ver README §3.1, encuadre experimental).
apiVersion: fleet.homelab.io/v1alpha1
kind: HostCluster
metadata:
  name: host-b
  namespace: fleet
  labels:
    env: acceptance
    region: us-west1
spec:
  crossplane:
    compositionRef:
      name: hostcluster-kubevirt
  kubernetesVersion: v1.31.5
  controlPlaneReplicas: 1
  workerReplicas: 1
  cpuCores: 2
  memory: "4Gi"
  vmNodeHostname: srv-t7910
  nodeArch: amd64
  nodeImage: quay.io/capk/ubuntu-2404-container-disk:v1.31.5
  cni: calico-vxlan
  role: regional
  region: us-west1
  cpInitTimeout: "15m0s"
