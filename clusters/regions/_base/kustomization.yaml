# SHARED base of a region's apps (run by EACH regional cluster's ArgoCD, seeded
# by the region-root). vcluster-register and local-path-storage are region-agnostic; the two appsets
# carry the REGION token that each region's overlay replaces. See clusters/regions/README.md
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - vclusters-appset.yaml      # provisions one vCluster per tenant in the region
  - workloads-appset.yaml      # deploys charts/tenant INSIDE each vCluster
  - vcluster-register.yaml     # registers the vClusters as ArgoCD clusters (region-agnostic)
  - local-path-storage.yaml    # local storage for the vClusters (region-agnostic)
