# SHARED BASE (parametrizable per region). Each region's overlay
# (region-root, see region-root-eu-west1.yaml) patches the REGION token → <region> in:
#   - metadata.name        (vclusters-<region>)
#   - the generator path (clusters/regions/<region>/tenants/**/*.yaml)
#   - the platform.idp/region label
# So adding a region = 1 small overlay, without duplicating this appset. See clusters/regions/README.md
#
# ApplicationSet running in the REGIONAL CLUSTER's ArgoCD (seeded by the region-root from the
# HelmChartProxy). Reads THIS region's tenants and provisions one vCluster per tenant IN THIS
# cluster (destination = kubernetes.default.svc = the regional). Same pattern as
# applicationsets/hosts-appset.yaml on the management, but scoped to the region and running in the
# regional's ArgoCD. So the management deploys no tenants: each regional cluster deploys its own.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vclusters-REGION
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/villadalmine/vcluster-idp.git
        revision: HEAD
        files:
          - path: "clusters/regions/REGION/tenants/**/*.yaml"
        requeueAfterSeconds: 30
  template:
    metadata:
      name: "vcluster-{{.tenant.name}}-{{.tenant.environment}}"
      labels:
        platform.idp/tenant: "{{.tenant.name}}"
        platform.idp/environment: "{{.tenant.environment}}"
        platform.idp/region: REGION
        platform.idp/layer: vcluster
    spec:
      project: default
      source:
        repoURL: https://charts.loft.sh
        chart: vcluster
        targetRevision: "0.35.0"
        helm:
          releaseName: "vcluster-{{.tenant.name}}-{{.tenant.environment}}"   # release==ns==svc → server https://<vc>.<ns>:443 (what the registration expects)
      destination:
        server: https://kubernetes.default.svc          # the regional cluster itself
        namespace: "vcluster-{{.tenant.name}}-{{.tenant.environment}}"
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 5
          backoff: { duration: 10s, factor: 2, maxDuration: 5m }
