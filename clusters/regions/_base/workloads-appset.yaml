# SHARED BASE (parametrizable). The overlay patches REGION → <region> in metadata.name,
# the generator path and the platform.idp/region label. See clusters/regions/README.md
#
# Deploys the tenant workload (ns·quota·netpol·secret·pg·api·web) INSIDE its vCluster, on
# the regional cluster. Mirror of applicationsets/tenants-appset.yaml but scoped to the region and
# running in the regional's ArgoCD. The destination `name: vcluster-<t>-<env>` is the cluster that
# the vcluster-register CronJob registers. Until the registration exists, this App stays in error
# (unknown destination) and retries — eventual consistency.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads-REGION
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/villadalmine/vcluster-idp.git
        revision: HEAD
        files:
          - path: "clusters/regions/REGION/tenants/**/*.yaml"
        requeueAfterSeconds: 30
  template:
    metadata:
      name: "wl-{{.tenant.name}}-{{.tenant.environment}}"
      # Attempted NON-cascading delete: the workload runs INSIDE the vCluster, so on tenant delete
      # the vcluster-app deletes the vCluster and the workload with it — the wl-app finalizer would hang against the
      # already-deleted vCluster (dead destination). NOTE: the appset-controller IGNORES this finalizers:[] and forces
      # the resources-finalizer anyway; so the real safety-net is the vcluster-register CronJob's GC, which
      # unsticks the hung wl-apps (removes the finalizer when the destination is no longer registered).
      finalizers: []
      labels:
        platform.idp/tenant: "{{.tenant.name}}"
        platform.idp/environment: "{{.tenant.environment}}"
        platform.idp/region: REGION
        platform.idp/layer: workload
    spec:
      project: default
      source:
        repoURL: https://github.com/villadalmine/vcluster-idp.git
        targetRevision: HEAD
        path: charts/tenant
        helm:
          valuesObject:
            # The tenant runs INSIDE the regional cluster's vCluster (nodes host-<region>-*), NOT on
            # the management. The chart default pins to srv-t7910 (GPU test) → here the pods would be
            # Pending. We free the scheduler for the region (scoped, doesn't touch the chart or the mgmt tenants).
            placement:
              nodeSelector: {}
            externalAccess:
              mode: gateway
            postgres:
              secretBackend: '{{ dig "tenant" "secretBackend" "generated" . }}'
            tenant:
              name: "{{.tenant.name}}"
              environment: "{{.tenant.environment}}"
              domain: "{{.tenant.domain}}"
            applications:
              api:
                version: "{{.applications.api.version}}"
              web:
                version: "{{.applications.web.version}}"
      destination:
        name: "vcluster-{{.tenant.name}}-{{.tenant.environment}}"   # the cluster the CronJob registers
        namespace: "{{.tenant.name}}"
      ignoreDifferences:
        - kind: Secret
          jsonPointers:
            - /data
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 5
          backoff: { duration: 10s, factor: 2, maxDuration: 5m }
