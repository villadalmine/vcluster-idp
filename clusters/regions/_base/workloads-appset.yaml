# BASE COMPARTIDA (parametrizable). El overlay parchea REGION → <region> en metadata.name,
# el path del generador y el label platform.idp/region. Ver clusters/regions/README.md
#
# Deploya el workload del tenant (ns·quota·netpol·secret·pg·api·web) DENTRO de su vCluster, en
# el cluster regional. Espejo de applicationsets/tenants-appset.yaml pero scopeado a la región y
# corriendo en el ArgoCD del regional. El destino `name: vcluster-<t>-<env>` es el cluster que
# registra el CronJob vcluster-register. Hasta que el registro exista, esta App queda en error
# (destino desconocido) y reintenta — consistencia eventual.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads-REGION
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/villadalmine/vcluster-idp.git
        revision: HEAD
        files:
          - path: "clusters/regions/REGION/tenants/**/*.yaml"
        requeueAfterSeconds: 30
  template:
    metadata:
      name: "wl-{{.tenant.name}}-{{.tenant.environment}}"
      # Intento de delete NO-cascading: el workload corre DENTRO del vCluster, así que al borrar el tenant
      # el vcluster-app borra el vCluster y con él el workload — el finalizer del wl-app colgaría contra el
      # vCluster ya borrado (destino muerto). NOTA: el appset-controller IGNORA este finalizers:[] y fuerza
      # igual el resources-finalizer; por eso el safety-net real es el GC del CronJob vcluster-register, que
      # destraba los wl-apps colgados (saca el finalizer cuando el destino ya no está registrado). Ver ADR-13.
      finalizers: []
      labels:
        platform.idp/tenant: "{{.tenant.name}}"
        platform.idp/environment: "{{.tenant.environment}}"
        platform.idp/region: REGION
        platform.idp/layer: workload
    spec:
      project: default
      source:
        repoURL: https://github.com/villadalmine/vcluster-idp.git
        targetRevision: HEAD
        path: charts/tenant
        helm:
          valuesObject:
            # El tenant corre DENTRO del vCluster del cluster regional (nodos host-<region>-*), NO en
            # el management. El default del chart pinea a srv-t7910 (test GPU) → acá los pods quedarían
            # Pending. Liberamos el scheduler para la región (scoped, no toca el chart ni los tenants mgmt).
            placement:
              nodeSelector: {}
            externalAccess:
              mode: gateway
            postgres:
              secretBackend: '{{ dig "tenant" "secretBackend" "generated" . }}'
            tenant:
              name: "{{.tenant.name}}"
              environment: "{{.tenant.environment}}"
              domain: "{{.tenant.domain}}"
            applications:
              api:
                version: "{{.applications.api.version}}"
              web:
                version: "{{.applications.web.version}}"
      destination:
        name: "vcluster-{{.tenant.name}}-{{.tenant.environment}}"   # el cluster que registra el CronJob
        namespace: "{{.tenant.name}}"
      ignoreDifferences:
        - kind: Secret
          jsonPointers:
            - /data
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 5
          backoff: { duration: 10s, factor: 2, maxDuration: 5m }
