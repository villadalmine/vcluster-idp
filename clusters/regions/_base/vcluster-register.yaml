# Auto-registro de vClusters como clusters de ArgoCD — la versión DECLARATIVA del script
# cli/register-vcluster, corriendo DENTRO del cluster regional (su ArgoCD no alcanza el API del
# vCluster por kubeconfig externo, pero sí por el service in-cluster). Un CronJob escanea los
# namespaces vcluster-* , lee el kubeconfig del vCluster (secret vc-<ns>) y crea/actualiza el
# Secret de cluster de ArgoCD apuntando a https://<vc>.<ns>:443. Idempotente (kubectl apply) y
# se auto-cura (cada 5 min agarra vClusters nuevos). Habilita que el workloads-appset deploye
# charts/tenant DENTRO de cada vCluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vcluster-register
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vcluster-register
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "delete"]                       # list para registrar; delete para GC de ns vcluster-* huérfanos
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]   # leer vc-<ns>, escribir/GC el cluster Secret en argocd
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list"]                                 # detectar si el vCluster (StatefulSet) sigue vivo o quedó huérfano
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "patch"]                        # destrabar wl-apps colgados en Deleting (destino vCluster ya borrado)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vcluster-register
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vcluster-register
subjects:
  - kind: ServiceAccount
    name: vcluster-register
    namespace: argocd
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vcluster-register
  namespace: argocd
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: vcluster-register
          restartPolicy: Never
          containers:
            - name: register
              image: alpine/k8s:1.31.0          # trae kubectl + bash + awk + base64
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -eu
                  for ns in $(kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -E '^vcluster-' || true); do
                    VC="$ns"; SECRET="vc-$ns"
                    KCFG="$(kubectl -n "$ns" get secret "$SECRET" -o jsonpath='{.data.config}' 2>/dev/null | base64 -d || true)"
                    [ -n "$KCFG" ] || { echo "skip $ns (sin $SECRET aún)"; continue; }
                    CA="$(printf '%s\n' "$KCFG"   | awk '/certificate-authority-data:/{print $2; exit}')"
                    CERT="$(printf '%s\n' "$KCFG" | awk '/client-certificate-data:/{print $2; exit}')"
                    KEY="$(printf '%s\n' "$KCFG"  | awk '/client-key-data:/{print $2; exit}')"
                    [ -n "$CA$CERT$KEY" ] || { echo "skip $ns (sin cert)"; continue; }
                    kubectl apply -f - <<EOF
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: $VC
                    namespace: argocd
                    labels:
                      argocd.argoproj.io/secret-type: cluster
                      platform.idp/managed-by: vcluster-register
                  type: Opaque
                  stringData:
                    name: $VC
                    server: https://$VC.$ns:443
                    config: |
                      {"tlsClientConfig":{"insecure":false,"caData":"$CA","certData":"$CERT","keyData":"$KEY"}}
                  EOF
                    echo "registrado $VC"
                  done

                  # ── GC del delete (reconciliación) ──────────────────────────────────────
                  # Borrar un tenant prunea el vcluster-app, pero deja el ns vacío + su PVC (los PVC de
                  # StatefulSet no se borran solos) + el cluster-secret de registro. El reconciliador los limpia:
                  # 1) ns vcluster-* huérfano = sin StatefulSet del vCluster + sin pods + >120s de vida
                  #    (el guard de edad evita borrar uno recién creándose) → borrar ns (cascadea PVC) + su secret.
                  for ns in $(kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -E '^vcluster-' || true); do
                    kubectl -n "$ns" get statefulset "$ns" >/dev/null 2>&1 && continue   # vCluster vivo → no tocar
                    [ "$(kubectl -n "$ns" get pods --no-headers 2>/dev/null | wc -l)" -eq 0 ] || continue
                    created="$(kubectl get ns "$ns" -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null || true)"
                    # edad como guard anti-race; busybox date no parsea RFC3339 (T...Z) → probamos con espacio,
                    # y si aún falla usamos epoch 0 (age enorme) para NO bloquear el GC (el check StatefulSet+pods ya confirma huérfano).
                    cepoch="$(date -d "$(echo "$created" | tr 'TZ' '  ')" +%s 2>/dev/null || echo 0)"
                    age=$(( $(date +%s) - cepoch ))
                    [ "$age" -gt 120 ] || { echo "skip GC $ns (joven, ${age}s)"; continue; }
                    echo "GC: ns $ns huerfano (vCluster borrado) -> borrando ns(+PVC) + registration secret"
                    kubectl delete ns "$ns" --wait=false 2>/dev/null || true
                    kubectl -n argocd delete secret "$ns" --ignore-not-found 2>/dev/null || true
                  done
                  # 2) registration secrets cuyo ns ya no existe → borrar
                  for s in $(kubectl -n argocd get secret -l platform.idp/managed-by=vcluster-register -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true); do
                    kubectl get ns "$s" >/dev/null 2>&1 || { echo "GC: registration secret $s (ns inexistente) -> borrando"; kubectl -n argocd delete secret "$s" --ignore-not-found 2>/dev/null || true; }
                  done
                  # 3) wl-apps colgados en Deleting porque su vCluster destino ya no existe → sacar el finalizer.
                  #    El appset-controller FUERZA el resources-finalizer (ignora finalizers:[] del template); al borrar
                  #    el tenant, el vcluster-app prunea el vCluster y el finalizer del wl-app cuelga contra un destino
                  #    muerto. Como el workload vive DENTRO del vCluster (ya borrado), el cleanup es moot → sacar finalizer.
                  for app in $(kubectl -n argocd get applications -l platform.idp/layer=workload -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true); do
                    [ -n "$(kubectl -n argocd get application "$app" -o jsonpath='{.metadata.deletionTimestamp}' 2>/dev/null || true)" ] || continue
                    dest="$(kubectl -n argocd get application "$app" -o jsonpath='{.spec.destination.name}' 2>/dev/null || true)"
                    if [ -n "$dest" ] && ! kubectl -n argocd get secret "$dest" >/dev/null 2>&1; then
                      echo "GC: wl-app $app colgado (destino $dest sin registro) -> removiendo finalizer"
                      kubectl -n argocd patch application "$app" --type=json -p '[{"op":"remove","path":"/metadata/finalizers"}]' 2>/dev/null || true
                    fi
                  done
