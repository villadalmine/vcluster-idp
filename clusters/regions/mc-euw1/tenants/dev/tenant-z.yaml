# Tenant dev de la región mc-euw1 (= el hijo mgmt-child, creado por host-mgmt). Lo lee el
# ApplicationSet vclusters-mc-euw1 que corre en el ArgoCD PROPIO de mgmt-child (sembrado por el
# region-root que host-mgmt le inyecta vía CRS). Materializa un vCluster aislado DENTRO de mgmt-child.
# Esto cierra la recursión: Root → host-mgmt (mgmt) → mgmt-child (regional) → vcluster-tenant-z.
tenant:
  name: tenant-z
  environment: dev
  domain: mc-euw1.example.com
applications:
  api:
    version: "2.23.0"
  web:
    version: "1.26-alpine"
