# Dev tenant in region eu-west1. Read by the vclusters-eu-west1 ApplicationSet (running in
# the regional cluster's ArgoCD) and materializes an isolated vCluster on that cluster.
# It's OUTSIDE tenants/ (the global path) on purpose: so the management appsets
# (tenants/**) don't pick it up — each region is independent.
tenant:
  name: tenant-a
  environment: dev
  domain: eu-west1.example.com
applications:
  api:
    version: "2.23.0"
  web:
    version: "1.26-alpine"
