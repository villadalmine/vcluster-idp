# ClusterResourceSet — VXLAN variant of Calico, PER-HOST. Injected ONLY into Clusters that the
# Composition labels cni=calico-vxlan (e.g. regional clusters on nested KubeVirt where Calico's
# IPIP —protocol 4— does NOT cross the per-VM masquerade and drops cross-node traffic).
# VXLAN runs over UDP 4789 and does pass. host-a (cni=calico, IPIP) stays untouched.
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: calico-vxlan-cni
  namespace: fleet
spec:
  clusterSelector:
    matchLabels:
      cni: calico-vxlan
  strategy: ApplyOnce
  resources:
    - name: calico-vxlan-cni
      kind: ConfigMap
