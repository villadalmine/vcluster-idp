# ClusterResourceSet — variante VXLAN de Calico, PER-HOST. Se inyecta SOLO en los Cluster que la
# Composition etiqueta cni=calico-vxlan (p.ej. clusters regionales sobre KubeVirt anidado donde el
# IPIP de Calico —protocolo 4— NO atraviesa el masquerade entre VMs y tira el tráfico cross-node).
# VXLAN va sobre UDP 4789 y sí pasa. host-a (cni=calico, IPIP) queda intacto.
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: calico-vxlan-cni
  namespace: fleet
spec:
  clusterSelector:
    matchLabels:
      cni: calico-vxlan
  strategy: ApplyOnce
  resources:
    - name: calico-vxlan-cni
      kind: ConfigMap
