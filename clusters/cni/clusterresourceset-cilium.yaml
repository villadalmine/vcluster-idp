# Cilium CRS — same mechanism as calico, but matches Clusters labeled cni=cilium
# (acceptance and prod). dev uses Calico. Cilium with ipam.mode=kubernetes uses the podCIDR k8s
# assigns from clusterNetwork.pods, so there's no need to hardcode the CIDR.
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: cilium-cni
  namespace: fleet
spec:
  clusterSelector:
    matchLabels:
      cni: cilium
  strategy: ApplyOnce
  resources:
    - name: cilium-cni
      kind: ConfigMap
