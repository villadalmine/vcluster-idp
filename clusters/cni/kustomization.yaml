# ArgoCD (path clusters/cni) renders this with kustomize:
#   - the ClusterResourceSet
#   - a ConfigMap `calico-cni` whose content IS the Calico manifest (calico.yaml)
# calico.yaml is NOT applied directly (kustomize consumes it as generator data), so
# Calico is NOT installed on the management — it's just packaged for the CRS to inject
# into the workload. All in the `fleet` namespace (where the CAPI Clusters live).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fleet
resources:
  - clusterresourceset.yaml               # CRS Calico/IPIP (dev — host-a)
  - clusterresourceset-cilium.yaml        # CRS Cilium (acceptance/prod)
  - clusterresourceset-calico-vxlan.yaml  # CRS Calico/VXLAN (per-host: KubeVirt anidado donde IPIP no pasa)
configMapGenerator:
  - name: calico-cni
    files:
      - calico.yaml
  - name: calico-vxlan-cni
    files:
      - calico.yaml=calico-vxlan.yaml
  - name: cilium-cni
    files:
      - cilium.yaml
generatorOptions:
  disableNameSuffixHash: true   # the CRSs reference the ConfigMaps by their exact name (calico-cni / cilium-cni)
