# ClusterResourceSet — the CAPI-native mechanism that
# injects manifests into EVERY cluster CAPI creates with the matching label, as soon as
# it is born. Here: the CNI (Calico). Without a CNI the nodes stay NotReady. The CNI must land BEFORE
# any ArgoCD inside the workload (pods need networking), which is why it goes via CRS and not
# via an ArgoCD Application pointing at the workload.
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: calico-cni
  namespace: fleet
spec:
  clusterSelector:
    matchLabels:
      cni: calico            # matches the CAPI Clusters the Composition labels cni=calico
  strategy: ApplyOnce        # once, when the cluster is born; CAPI applies it with the workload's kubeconfig
  resources:
    - name: calico-cni       # the ConfigMap (generated by kustomize) that CONTAINS the Calico manifest
      kind: ConfigMap
