# ═══ vcluster.yaml — SHARED NODES (the DEMO model, RUNS) ════════════════════
# Each tenant = a vCluster with its own control plane (API server + etcd + CRDs),
# sharing the host cluster's worker nodes. Real control-plane isolation; residual
# risk = shared node kernel (see the isolation spectrum).
#
# NOTE (vCluster 0.35): the distro is k8s (vanilla) by default — k3s was removed
# from the chart — so we do NOT override controlPlane.distro.
controlPlane:
  statefulSet:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
sync:
  toHost:
    # Tenant Ingresses synced to the host (legacy external-access path).
    ingresses:
      enabled: true
    # Gateway API: tenant Gateway/HTTPRoute/TLSRoute synced to the host (with
    # reference rewriting). Makes externalAccess.mode=gateway work end-to-end.
    gatewayApi:
      enabled: true
  fromHost:
    # Import host nodes so the tenant scheduler sees them (needed for nodeSelector,
    # e.g. pinning to the GPU node srv-t7910).
    nodes:
      enabled: true
      selector:
        all: true
    # Import the host GatewayClasses (e.g. `cilium`) so a tenant Gateway can
    # reference gatewayClassName: cilium without its own controller.
    gatewayClasses:
      enabled: true
