# ═══ vcluster.yaml — SHARED NODES (the DEMO model, RUNS) ════════════════════
# Each tenant = a vCluster with its own control plane (API server + etcd + CRDs),
# sharing the host cluster's worker nodes. Real control-plane isolation;
# residual risk = shared node kernel (see the isolation spectrum).
controlPlane:
  distro:
    k3s:                 # embedded k3s: lightweight, the shared-nodes default
      enabled: true
  backingStore:
    etcd:
      embedded:
        enabled: true
  statefulSet:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
sync:
  toHost:
    # Tenant Ingresses synced to the host (legacy external-access path).
    ingresses:
      enabled: true
    # Gateway API: tenant Gateway/HTTPRoute/TLSRoute/ReferenceGrant synced to the
    # host (with reference rewriting). This is what makes `externalAccess.mode=gateway`
    # work — the host Gateway controller (Cilium) serves the tenant's routes.
    gatewayApi:
      enabled: true
  fromHost:
    nodes:
      enabled: true
      selector:
        all: true
    # Import the host GatewayClasses (e.g. `cilium`) into the tenant so a tenant
    # Gateway can reference `gatewayClassName: cilium` without its own controller.
    gatewayClasses:
      enabled: true
