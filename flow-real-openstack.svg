<svg viewBox="0 0 920 1180" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Real case (OpenStack) — full flow: bootstrap+pivot, management cluster, host clusters, vClusters, and the repos</title>
  <desc>Stage 0 bootstrap: a throwaway kind cluster runs CAPI to create the management cluster on OpenStack, then clusterctl move (pivot) hands control to it and the kind is deleted. The management cluster (CAPI+CAPO, Crossplane, ArgoCD-mgmt) reads the fleet repo and creates host clusters on OpenStack, seeding each with ArgoCD. Each host cluster (ArgoCD-host + addons) reads the platform and tenants repos and deploys vClusters with Helm. Repos shown on the left.</desc>
  <style>
    text{fill:#1a1a1a} .sub{fill:#5a5a5a} .info{fill:#1f6feb} .grn{fill:#15803d} .amb{fill:#b45309} .red{fill:#b91c1c}
    .p{fill:rgba(130,130,130,0.10)} .b{fill:rgba(130,130,130,0.07)} rect{stroke:#c9c9c9}
    .bi{stroke:#1f6feb} .bg{stroke:#15803d} .ba{stroke:#b45309} .br{stroke:#b91c1c} line{stroke:#888}
    @media (prefers-color-scheme:dark){text{fill:#e6e6e6}.sub{fill:#a0a0a0}.info{fill:#58a6ff}.grn{fill:#4ade80}.amb{fill:#fbbf24}.red{fill:#f87171}rect{stroke:#444}.bi{stroke:#58a6ff}.bg{stroke:#4ade80}.ba{stroke:#fbbf24}.br{stroke:#f87171}}
  </style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#888"/></marker></defs>

  <text x="20" y="28" font-size="17" font-weight="700">Caso REAL (OpenStack) — flujo completo + repos</text>

  <!-- ===== REPOS sidebar ===== -->
  <text x="20" y="58" font-size="12" font-weight="700">Repos (Git)</text>
  <rect x="20" y="66" width="176" height="62" rx="8" class="b ba"/>
  <text x="30" y="84" font-size="10.5" font-weight="700" class="amb">infra/ (Ansible/TF)</text>
  <text x="30" y="99" font-size="9.5" class="sub">clusterctl init + pivot</text>
  <text x="30" y="113" font-size="9.5" class="sub">+ ArgoCD-mgmt + secrets</text>
  <rect x="20" y="232" width="176" height="60" rx="8" class="b bi"/>
  <text x="30" y="250" font-size="10.5" font-weight="700" class="info">fleet/</text>
  <text x="30" y="265" font-size="9.5" class="sub">HostCluster Claims</text>
  <text x="30" y="279" font-size="9.5" class="sub">(CAPI / Crossplane)</text>
  <rect x="20" y="520" width="176" height="74" rx="8" class="b bg"/>
  <text x="30" y="538" font-size="10.5" font-weight="700" class="grn">platform/</text>
  <text x="30" y="553" font-size="9.5" class="sub">addons + ApplicationSets</text>
  <text x="30" y="567" font-size="9.5" class="sub">cert-mgr·cilium·ESO·gw·</text>
  <text x="30" y="580" font-size="9.5" class="sub">HAMi·crossplane(opt)</text>
  <rect x="20" y="600" width="176" height="54" rx="8" class="b bg"/>
  <text x="30" y="618" font-size="10.5" font-weight="700" class="grn">tenants/</text>
  <text x="30" y="633" font-size="9.5" class="sub">tenant.yaml por tenant</text>
  <text x="30" y="647" font-size="9.5" class="sub">(lo escribe el CLI platform)</text>

  <!-- repo → stage arrows -->
  <line x1="196" y1="97" x2="232" y2="118" class="ba" marker-end="url(#a)"/>
  <line x1="196" y1="262" x2="232" y2="300" class="bi" marker-end="url(#a)"/>
  <line x1="196" y1="557" x2="232" y2="560" class="bg" marker-end="url(#a)"/>
  <line x1="196" y1="627" x2="232" y2="600" class="bg" marker-end="url(#a)"/>

  <!-- ===== STAGE 0: bootstrap + pivot ===== -->
  <rect x="232" y="66" width="672" height="118" rx="10" class="b br"/>
  <text x="246" y="86" font-size="12" font-weight="700" class="red">&#9312; BOOTSTRAP (una sola vez, imperativo: Ansible / Terraform / clusterctl en CI) — acá SÍ va el pivot</text>
  <rect x="248" y="96" width="150" height="76" rx="8" class="p"/>
  <text x="258" y="114" font-size="10.5" font-weight="700">kind (laptop)</text>
  <text x="258" y="129" font-size="9.5" class="sub">DESCARTABLE</text>
  <text x="258" y="146" font-size="9.5" class="sub">clusterctl init</text>
  <text x="258" y="160" font-size="9.5" class="sub">(CAPI + CAPO)</text>
  <line x1="398" y1="134" x2="430" y2="134" marker-end="url(#a)"/>
  <rect x="432" y="96" width="200" height="76" rx="8" class="p"/>
  <text x="442" y="114" font-size="10.5" font-weight="700">crea el Management</text>
  <text x="442" y="129" font-size="9.5" class="sub">en OpenStack (3 CP = HA)</text>
  <text x="442" y="146" font-size="9.5" class="sub">vía CAPO (VMs Nova)</text>
  <line x1="632" y1="134" x2="664" y2="134" marker-end="url(#a)"/>
  <rect x="666" y="96" width="222" height="76" rx="8" class="p br"/>
  <text x="676" y="114" font-size="10.5" font-weight="700" class="red">clusterctl move = PIVOT</text>
  <text x="676" y="129" font-size="9.5" class="sub">mueve objetos CAPI: kind &#8594; Mgmt</text>
  <text x="676" y="143" font-size="9.5" class="sub">+ instala ArgoCD-mgmt + secrets</text>
  <text x="676" y="160" font-size="9.5" class="sub">luego BORRA el kind</text>
  <line x1="568" y1="184" x2="568" y2="204" marker-end="url(#a)"/>
  <text x="576" y="198" font-size="9.5" class="sub">el MISMO proceso instala ArgoCD-mgmt + tooling de secrets (ESO/Sealed/SOPS) + siembra las 1&#170; creds &#8594; Management auto-suficiente</text>

  <!-- ===== MANAGEMENT CLUSTER ===== -->
  <rect x="232" y="206" width="672" height="140" rx="10" class="b bi"/>
  <text x="246" y="226" font-size="12" font-weight="700" class="info">MANAGEMENT CLUSTER (OpenStack · 3 CP HA · self-managing)</text>
  <rect x="248" y="236" width="200" height="58" rx="8" class="p ba"/>
  <text x="258" y="254" font-size="10.5" font-weight="700" class="amb">ArgoCD (mgmt)</text>
  <text x="258" y="269" font-size="9.5" class="sub">lee fleet/ → entrega Claims</text>
  <text x="258" y="283" font-size="9.5" class="sub">+ siembra Argo en cada host</text>
  <rect x="458" y="236" width="180" height="58" rx="8" class="p"/>
  <text x="468" y="254" font-size="10.5" font-weight="700">CAPI + CAPO</text>
  <text x="468" y="269" font-size="9.5" class="sub">crea host clusters</text>
  <text x="468" y="283" font-size="9.5" class="sub">(VMs en OpenStack)</text>
  <rect x="648" y="236" width="240" height="58" rx="8" class="p bi"/>
  <text x="658" y="254" font-size="10.5" font-weight="700" class="info">Crossplane</text>
  <text x="658" y="269" font-size="9.5" class="sub">compone HostCluster</text>
  <text x="658" y="283" font-size="9.5" class="sub">(bundle CAPI + red + DNS + label)</text>
  <text x="246" y="318" font-size="9.5" class="sub">Flujo: ArgoCD-mgmt lee <tspan class="info" font-weight="700">fleet/</tspan> → Crossplane compone → CAPO crea las VMs del host cluster + la ClusterResourceSet siembra su ArgoCD.</text>
  <text x="246" y="335" font-size="9.5" class="sub">Este cluster es el que el pivot dejó self-managing. Corre CAPI+Crossplane+ArgoCD; NO corre tenants.</text>
  <line x1="568" y1="346" x2="568" y2="366" marker-end="url(#a)"/>
  <text x="576" y="360" font-size="9.5" class="sub">CAPO provisiona VMs + Argo-mgmt siembra el ArgoCD local del host</text>

  <!-- ===== HOST CLUSTER ===== -->
  <rect x="232" y="368" width="672" height="226" rx="10" class="b bg"/>
  <text x="246" y="388" font-size="12" font-weight="700" class="grn">HOST CLUSTER (por región · &#215;N) — self-managing</text>
  <rect x="248" y="398" width="200" height="54" rx="8" class="p ba"/>
  <text x="258" y="416" font-size="10.5" font-weight="700" class="amb">ArgoCD (host-local)</text>
  <text x="258" y="431" font-size="9.5" class="sub">lee platform/ + tenants/</text>
  <text x="258" y="445" font-size="9.5" class="sub">(sembrado por el CRS)</text>
  <rect x="458" y="398" width="430" height="54" rx="8" class="p"/>
  <text x="468" y="416" font-size="10.5" font-weight="700">platform/addons</text>
  <text x="468" y="436" font-size="9.5" class="sub">cert-manager · cilium · ESO · gateway · HAMi · prometheus · (Crossplane local opcional)</text>
  <rect x="260" y="464" width="290" height="116" rx="8" class="b bg"/>
  <text x="272" y="482" font-size="10.5" font-weight="700" class="grn">vCluster = tenant-a</text>
  <text x="272" y="499" font-size="9.5" class="sub">Helm: charts/tenant (desde tenants/)</text>
  <text x="272" y="515" font-size="9.5" class="sub">ns·quota·netpol·secret·pg</text>
  <text x="272" y="530" font-size="9.5" class="sub">api·web·Gateway+TLS</text>
  <text x="272" y="552" font-size="9" class="grn">← el workload del tenant es Helm</text>
  <text x="272" y="568" font-size="9" class="sub">(o un Claim Crossplane si el host corre Crossplane)</text>
  <rect x="570" y="464" width="318" height="116" rx="8" class="b bg"/>
  <text x="582" y="482" font-size="10.5" font-weight="700" class="grn">vCluster = tenant-b … ×N</text>
  <text x="582" y="499" font-size="9.5" class="sub">mismo patrón, aislado</text>
  <text x="582" y="519" font-size="9.5" class="sub">cada tenant = su propio control-plane</text>
  <text x="582" y="539" font-size="9.5" class="sub">virtual (API · RBAC · CRDs propios)</text>
  <text x="582" y="563" font-size="9" class="sub">GPU: HAMi slices por tenant (Nebul)</text>

  <!-- homelab note -->
  <rect x="232" y="612" width="672" height="64" rx="10" fill="none" stroke-dasharray="3 2.5" class="bi"/>
  <text x="246" y="632" font-size="11" font-weight="700" class="info">HOMELAB = todo esto COLAPSADO en 1 cluster — SIN bootstrap ni pivot</text>
  <text x="246" y="650" font-size="9.5" class="sub">Ya tenés un cluster k8s → ESE es el management+host. ArgoCD único + Helm + vClusters. CAPI/Crossplane = código/futuro.</text>
  <text x="246" y="666" font-size="9.5" class="sub">Para CAPI real en homelab: KubeVirt + CAPK crean VMs sobre srv-t7910 → un host cluster (sin pivot, tu cluster ya es el management).</text>

  <!-- legend -->
  <text x="20" y="712" font-size="12" font-weight="700">Resumen de componentes:</text>
  <text x="30" y="732" font-size="11"><tspan class="red" font-weight="700">Bootstrap/pivot</tspan><tspan class="sub"> = sólo caso real, una vez: proceso imperativo (Ansible/Terraform/CI) — kind crea el management, hace el pivot, e </tspan><tspan font-weight="700">instala ArgoCD-mgmt + secret tooling + siembra las 1ª creds</tspan><tspan class="sub">. Homelab: no aplica.</tspan></text>
  <text x="30" y="750" font-size="11"><tspan class="info" font-weight="700">Management cluster</tspan><tspan class="sub"> = CAPI+CAPO + Crossplane + ArgoCD-mgmt. Lee fleet/. Crea host clusters. NO corre tenants.</tspan></text>
  <text x="30" y="768" font-size="11"><tspan class="grn" font-weight="700">Host cluster (×N)</tspan><tspan class="sub"> = ArgoCD-host + addons. Lee platform/ + tenants/. Despliega los vClusters con Helm. Se auto-gestiona.</tspan></text>
  <text x="30" y="786" font-size="11"><tspan class="grn" font-weight="700">vCluster = tenant</tspan><tspan class="sub"> = control-plane virtual aislado por tenant; workload = Helm (charts/tenant). GPU = HAMi.</tspan></text>
  <text x="30" y="804" font-size="11"><tspan class="amb" font-weight="700">ArgoCD</tspan><tspan class="sub"> = DOS niveles: mgmt (entrega Claims + siembra) y host-local (addons + tenants). </tspan><tspan class="info" font-weight="700">Crossplane</tspan><tspan class="sub"> = en el management, sobre CAPI.</tspan></text>
  <text x="30" y="822" font-size="11"><tspan font-weight="700">Repos</tspan><tspan class="sub"> = infra/ (bootstrap) · fleet/ (HostCluster Claims) · platform/ (addons+appsets) · tenants/ (tenant.yaml).</tspan></text>
</svg>
