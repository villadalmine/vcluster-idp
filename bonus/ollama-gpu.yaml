# BONUS (not an IDP requirement) — Ollama LLM on a HAMi vGPU slice.
# HAMi (already on the Root cluster) slices the bare-metal GPUs with HARD limits: the pod requests
# nvidia.com/gpu + a VRAM cap (nvidia.com/gpumem, MiB) + a compute cap (nvidia.com/gpucores, %).
# No MIG hardware, no GPU passthrough — software vGPU (hami-core). Models persist on a PVC so a
# pod restart does NOT re-download them.
apiVersion: v1
kind: Namespace
metadata: { name: gpu-test }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: ollama-models, namespace: gpu-test }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 8Gi } }
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: ollama, namespace: gpu-test }
spec:
  replicas: 1
  selector: { matchLabels: { app: ollama } }
  template:
    metadata: { labels: { app: ollama } }
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports: [{ containerPort: 11434 }]
          resources:
            requests: { cpu: "500m", memory: 1Gi }
            limits:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: "1"        # one vGPU
              nvidia.com/gpumem: "4000"  # HARD cap: 4000 MiB VRAM (of an 8 GB card)
              nvidia.com/gpucores: "40"  # HARD cap: 40% of the GPU's compute
          volumeMounts:
            - { name: models, mountPath: /root/.ollama }   # models persist across restarts
      volumes:
        - name: models
          persistentVolumeClaim: { claimName: ollama-models }
