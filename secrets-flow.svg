<svg viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Secret flow — what &amp; which solution at each layer (backend-agnostic)</title>
  <desc>A secret backend (any of HashiCorp Vault, OpenBao, AWS/GCP/Azure secret managers, CyberArk, 1Password, Infisical) holds the secret values. Git holds only ExternalSecret references or SOPS-encrypted blobs, never plaintext. ESO is the bridge in every cluster that reads the backend and creates k8s Secrets. Bootstrap uses Workload Identity (cloud-agnostic) so there are no static creds. Tenants use a namespaced SecretStore mapped to a per-tenant path/policy in the backend.</desc>
  <style>
    text{fill:#1a1a1a} .sub{fill:#5a5a5a} .info{fill:#1f6feb} .grn{fill:#15803d} .amb{fill:#b45309} .red{fill:#b91c1c}
    .p{fill:rgba(130,130,130,0.10)} .b{fill:rgba(130,130,130,0.07)} rect{stroke:#c9c9c9}
    .bi{stroke:#1f6feb} .bg{stroke:#15803d} .ba{stroke:#b45309} .br{stroke:#b91c1c} line{stroke:#888}
    @media (prefers-color-scheme:dark){text{fill:#e6e6e6}.sub{fill:#a0a0a0}.info{fill:#58a6ff}.grn{fill:#4ade80}.amb{fill:#fbbf24}.red{fill:#f87171}rect{stroke:#444}.bi{stroke:#58a6ff}.bg{stroke:#4ade80}.ba{stroke:#fbbf24}.br{stroke:#f87171}}
  </style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#888"/></marker></defs>

  <text x="20" y="28" font-size="16" font-weight="700">Secrets flow — what and which solution at each layer (backend-agnostic)</text>

  <!-- BACKEND (left) -->
  <rect x="16" y="52" width="180" height="468" rx="10" class="b br"/>
  <text x="106" y="74" text-anchor="middle" font-size="12" font-weight="700" class="red">SECRET BACKEND ("Vault")</text>
  <text x="106" y="92" text-anchor="middle" font-size="9.5" class="sub">= any key store:</text>
  <text x="106" y="108" text-anchor="middle" font-size="9.5" class="sub">HashiCorp Vault · OpenBao</text>
  <text x="106" y="122" text-anchor="middle" font-size="9.5" class="sub">AWS SM · GCP SM · Azure KV</text>
  <text x="106" y="136" text-anchor="middle" font-size="9.5" class="sub">CyberArk · 1Password · Infisical</text>
  <text x="106" y="162" text-anchor="middle" font-size="10" font-weight="700">the TRUTH of the values</text>
  <text x="106" y="182" text-anchor="middle" font-size="9.5" class="sub">· policy/path per tenant</text>
  <text x="106" y="196" text-anchor="middle" font-size="9.5" class="sub">· dynamic secrets (TTL)</text>
  <text x="106" y="210" text-anchor="middle" font-size="9.5" class="sub">· rotation · audit</text>
  <text x="106" y="500" text-anchor="middle" font-size="9.5" class="info">ESO connects via a</text>
  <text x="106" y="514" text-anchor="middle" font-size="9.5" class="info">"provider" per backend</text>

  <!-- GIT (right) -->
  <rect x="704" y="52" width="180" height="468" rx="10" class="b ba"/>
  <text x="794" y="74" text-anchor="middle" font-size="12" font-weight="700" class="amb">Git (repos)</text>
  <text x="794" y="96" text-anchor="middle" font-size="9.5" class="sub">ONLY references:</text>
  <text x="794" y="110" text-anchor="middle" font-size="9.5" class="sub">kind ExternalSecret</text>
  <text x="794" y="124" text-anchor="middle" font-size="9.5" class="sub">(pointer to the backend)</text>
  <text x="794" y="146" text-anchor="middle" font-size="9.5" class="sub">+ blobs SOPS/Sealed</text>
  <text x="794" y="160" text-anchor="middle" font-size="9.5" class="sub">(secrets encrypted IN Git)</text>
  <text x="794" y="184" text-anchor="middle" font-size="10" font-weight="700" class="red">NEVER plaintext</text>

  <!-- Band 1 -->
  <rect x="208" y="52" width="488" height="98" rx="9" class="b br"/>
  <text x="222" y="71" font-size="11.5" font-weight="700" class="red">&#9312; BOOTSTRAP &#8212; imperative process (Ansible / Terraform / clusterctl in CI)</text>
  <text x="222" y="88" font-size="9.5" class="sub">first secret = infra provider creds &#183; join token &#8594; <tspan class="info" font-weight="700">Workload Identity</tspan> or pipeline env / SOPS as-code</text>
  <text x="222" y="107" font-size="10" font-weight="700" class="info">the SAME process: triggers the pivot (clusterctl move) + installs ArgoCD-mgmt + secrets tooling</text>
  <text x="222" y="123" font-size="9.5" class="sub">(ESO / Sealed controller / SOPS key) &#8212; the management has no GitOps yet to install them</text>
  <text x="222" y="141" font-size="9.5" class="grn">&#8594; leaves the management <tspan font-weight="700">self-sufficient</tspan> to create host clusters. From there, <tspan font-weight="700">all as-code</tspan>.</text>

  <!-- Band 2 -->
  <rect x="208" y="158" width="488" height="100" rx="9" class="b bi"/>
  <text x="222" y="178" font-size="11.5" font-weight="700" class="info">&#9313; MANAGEMENT CLUSTER</text>
  <text x="222" y="197" font-size="9.5" class="sub">secret: CAPI creds · repo deploy keys · Crossplane provider creds</text>
  <rect x="222" y="206" width="92" height="42" rx="6" class="p bi"/>
  <text x="268" y="223" text-anchor="middle" font-size="10" font-weight="700" class="info">ESO</text>
  <text x="268" y="238" text-anchor="middle" font-size="8.5" class="sub">backend→Secret</text>
  <text x="324" y="223" font-size="10.5" font-weight="700">&#8594; ESO + backend</text>
  <text x="324" y="241" font-size="9.5" class="sub">auth: Workload Identity (no static secret to reach the backend)</text>

  <!-- Band 3 -->
  <rect x="208" y="266" width="488" height="100" rx="9" class="b bg"/>
  <text x="222" y="286" font-size="11.5" font-weight="700" class="grn">&#9314; HOST CLUSTER (&#215;N)</text>
  <text x="222" y="305" font-size="9.5" class="sub">secret: its ArgoCD Git access · cert-manager CA · registry</text>
  <rect x="222" y="314" width="92" height="42" rx="6" class="p bi"/>
  <text x="268" y="331" text-anchor="middle" font-size="10" font-weight="700" class="info">ESO (addon)</text>
  <text x="268" y="346" text-anchor="middle" font-size="8.5" class="sub">on each host</text>
  <text x="324" y="331" font-size="10.5" font-weight="700">&#8594; ESO addon + backend</text>
  <text x="324" y="349" font-size="9.5" class="sub">k8s-auth with a role/path per cluster (each host reads only its own)</text>

  <!-- Band 4 -->
  <rect x="208" y="374" width="488" height="112" rx="9" class="b bg"/>
  <text x="222" y="394" font-size="11.5" font-weight="700" class="grn">&#9315; TENANT (vCluster)</text>
  <text x="222" y="413" font-size="9.5" class="sub">secret: Postgres password · app secrets</text>
  <rect x="222" y="422" width="92" height="48" rx="6" class="p bi"/>
  <text x="268" y="440" text-anchor="middle" font-size="9.5" font-weight="700" class="info">ESO</text>
  <text x="268" y="453" text-anchor="middle" font-size="8.5" class="sub">SecretStore</text>
  <text x="268" y="464" text-anchor="middle" font-size="8.5" class="sub">namespaced</text>
  <text x="324" y="438" font-size="10.5" font-weight="700">&#8594; ESO SecretStore namespaced + path/policy per tenant</text>
  <text x="324" y="455" font-size="9.5" class="sub">secret/tenants/&lt;tenant&gt;/* — isolation by backend policy</text>
  <text x="324" y="472" font-size="9.5" class="grn">demo (what we built): in-cluster Password generator, no backend</text>

  <!-- arrows backend → ESO -->
  <line x1="196" y1="227" x2="222" y2="227" marker-end="url(#a)"/>
  <line x1="196" y1="335" x2="222" y2="335" marker-end="url(#a)"/>
  <line x1="196" y1="446" x2="222" y2="446" marker-end="url(#a)"/>
  <!-- arrows Git → reference -->
  <line x1="704" y1="208" x2="696" y2="208" class="ba" marker-end="url(#a)"/>
  <line x1="704" y1="316" x2="696" y2="316" class="ba" marker-end="url(#a)"/>
  <line x1="704" y1="424" x2="696" y2="424" class="ba" marker-end="url(#a)"/>

  <!-- legend -->
  <text x="20" y="548" font-size="11.5" font-weight="700">The rule:</text>
  <text x="30" y="567" font-size="10.5" class="sub"><tspan class="amb" font-weight="700">Git</tspan> sends the reference (ExternalSecret) → <tspan class="info" font-weight="700">ESO</tspan> resolves it against the <tspan class="red" font-weight="700">backend</tspan> → creates the k8s Secret → the workload consumes it. The value never passes through Git.</text>
  <text x="30" y="588" font-size="10.5"><tspan font-weight="700">SOPS / Sealed Secrets</tspan><tspan class="sub"> = encrypt IN Git (no external backend): simple, but no rotation/dynamic and weak multi-tenant isolation.</tspan></text>
  <text x="30" y="606" font-size="10.5"><tspan font-weight="700">ESO + backend</tspan><tspan class="sub"> = reference + real store: rotation, dynamic secrets, audit, per-tenant policy. The "secrets-as-a-service" model.</tspan></text>
  <text x="30" y="630" font-size="10.5"><tspan class="red" font-weight="700">Vault shared per customer:</tspan><tspan class="sub"> isolation is enforced by the backend POLICY (tied to the k8s identity), not ESO. k8s/ESO decides which SecretStore you use; the backend decides what you can read.</tspan></text>
</svg>
