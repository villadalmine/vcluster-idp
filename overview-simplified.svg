<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Modelo simplificado — visión general (4 capas)</title>
  <desc>Cuatro capas: repos Git (fleet, platform, tenants); management cluster (CAPI+Crossplane+ArgoCD) que crea host clusters; host clusters (ArgoCD+addons) que despliegan vClusters; vClusters = tenants con Helm. Real: el management se bootstrapea con kind+pivot. Homelab: un solo cluster colapsa todo.</desc>
  <style>
    text{fill:#1a1a1a} .sub{fill:#5a5a5a} .info{fill:#1f6feb} .grn{fill:#15803d} .amb{fill:#b45309}
    .p{fill:rgba(130,130,130,0.10)} rect{stroke:#c9c9c9} .bi{stroke:#1f6feb} .bg{stroke:#15803d} .ba{stroke:#b45309} line{stroke:#888}
    @media (prefers-color-scheme:dark){text{fill:#e6e6e6}.sub{fill:#a0a0a0}.info{fill:#58a6ff}.grn{fill:#4ade80}.amb{fill:#fbbf24}rect{stroke:#444}.bi{stroke:#58a6ff}.bg{stroke:#4ade80}.ba{stroke:#fbbf24}}
  </style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#888"/></marker></defs>

  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="700">Modelo simplificado — visión general</text>

  <!-- 1 Git -->
  <rect x="230" y="48" width="300" height="48" rx="9" class="p ba"/>
  <text x="380" y="68" text-anchor="middle" font-size="12" font-weight="700" class="amb">Git: fleet/ · platform/ · tenants/</text>
  <text x="380" y="85" text-anchor="middle" font-size="10" class="sub">fuente de verdad (lo que el CLI platform escribe)</text>
  <line x1="380" y1="96" x2="380" y2="120" marker-end="url(#a)"/>

  <!-- 2 management -->
  <rect x="150" y="122" width="460" height="78" rx="9" class="p bi"/>
  <text x="380" y="143" text-anchor="middle" font-size="12.5" font-weight="700" class="info">MANAGEMENT CLUSTER</text>
  <text x="380" y="162" text-anchor="middle" font-size="10.5" class="sub">CAPI (+ infra provider) · Crossplane · ArgoCD-mgmt</text>
  <text x="380" y="180" text-anchor="middle" font-size="10.5" class="sub">lee fleet/ → crea HOST CLUSTERS + les siembra ArgoCD</text>
  <text x="380" y="195" text-anchor="middle" font-size="9.5" class="sub">(real: nace con kind + pivot · 3 CP HA)</text>
  <line x1="380" y1="200" x2="380" y2="224" marker-end="url(#a)"/>
  <text x="388" y="218" font-size="9.5" class="sub">CAPI crea VMs/baremetal + siembra Argo</text>

  <!-- 3 host -->
  <rect x="150" y="226" width="460" height="74" rx="9" class="p bg"/>
  <text x="380" y="247" text-anchor="middle" font-size="12.5" font-weight="700" class="grn">HOST CLUSTER (por región · ×N)</text>
  <text x="380" y="266" text-anchor="middle" font-size="10.5" class="sub">ArgoCD-host · platform/addons (cert-mgr·cilium·ESO·gw·HAMi)</text>
  <text x="380" y="284" text-anchor="middle" font-size="10.5" class="sub">lee platform/ + tenants/ → despliega los vClusters</text>
  <line x1="380" y1="300" x2="380" y2="324" marker-end="url(#a)"/>
  <text x="388" y="318" font-size="9.5" class="sub">ApplicationSet → charts/tenant (Helm)</text>

  <!-- 4 tenants -->
  <rect x="180" y="326" width="190" height="64" rx="9" class="p bg"/>
  <text x="275" y="348" text-anchor="middle" font-size="11.5" font-weight="700" class="grn">vCluster = tenant-a</text>
  <text x="275" y="366" text-anchor="middle" font-size="10" class="sub">Helm: charts/tenant</text>
  <text x="275" y="381" text-anchor="middle" font-size="10" class="sub">pg · api · web · GW+TLS</text>
  <rect x="390" y="326" width="190" height="64" rx="9" class="p bg"/>
  <text x="485" y="348" text-anchor="middle" font-size="11.5" font-weight="700" class="grn">vCluster = tenant-b … ×N</text>
  <text x="485" y="366" text-anchor="middle" font-size="10" class="sub">aislado · GPU = HAMi</text>
  <text x="485" y="381" text-anchor="middle" font-size="10" class="sub">(opcional: XR Crossplane v2)</text>

  <!-- legend -->
  <rect x="60" y="416" width="640" height="118" rx="9" fill="none" stroke-dasharray="3 2.5" class="bi"/>
  <text x="74" y="436" font-size="11.5" font-weight="700" class="info">Las dos variantes del mismo modelo:</text>
  <text x="74" y="456" font-size="10.5"><tspan font-weight="700">REAL (fleet):</tspan><tspan class="sub"> management (CAPI+Crossplane) crea N host clusters por región; cada host se auto-gestiona los tenants.</tspan></text>
  <text x="74" y="474" font-size="10.5"><tspan font-weight="700">HOMELAB:</tspan><tspan class="sub"> mgmt + host COLAPSADOS en 1 cluster; un ArgoCD; vClusters reales. CAPI/CAPK+Crossplane v2 = camino corrible (KubeVirt en t7910).</tspan></text>
  <text x="74" y="496" font-size="10.5"><tspan class="info" font-weight="700">Crossplane v2</tspan><tspan class="sub"> = en el management, compone el Cluster CAPI directo (sin claim, XR namespaced). </tspan><tspan class="grn" font-weight="700">Helm</tspan><tspan class="sub"> = el tenant.</tspan></text>
  <text x="74" y="514" font-size="10.5"><tspan class="amb" font-weight="700">ArgoCD</tspan><tspan class="sub"> = 2 niveles (mgmt entrega XRs/Compositions+siembra; host instala addons+tenants). El CLI platform sólo escribe en Git.</tspan></text>
</svg>
