# Tenant-owned HTTPRoutes (host-side). They attach to the tenant's own Gateway and
# route to the vCluster-synced Services (mangled host names).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.tenant.name }}-api-route
  labels:
    {{- include "route.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.tenant.name }}-gateway
  hostnames:
    - "api.{{ .Values.tenant.name }}.{{ .Values.tenant.domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "route.syncedSvc" (dict "root" . "app" "customer-api") }}
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.tenant.name }}-web-route
  labels:
    {{- include "route.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.tenant.name }}-gateway
  hostnames:
    - "web.{{ .Values.tenant.name }}.{{ .Values.tenant.domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "route.syncedSvc" (dict "root" . "app" "customer-web") }}
          port: 80
