# Per-tenant Gateway (tenant-owned, host-side). GatewayClass is agnostic.
# HTTP by default; HTTPS (cert-manager gateway-shim) when tls.enabled.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.tenant.name }}-gateway
  {{- if .Values.tls.enabled }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.tls.clusterIssuer }}
  {{- end }}
  labels:
    {{- include "route.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    {{- if .Values.tls.enabled }}
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.{{ .Values.tenant.name }}.{{ .Values.tenant.domain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.tenant.name }}-tls
      allowedRoutes:
        namespaces:
          from: Same
    {{- else }}
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.{{ .Values.tenant.name }}.{{ .Values.tenant.domain }}"
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
