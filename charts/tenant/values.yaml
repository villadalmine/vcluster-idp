# -----------------------------------------------------------------------------
# values.yaml — a single tenant's workload. The tenants ApplicationSet overrides
# `tenant.name` and the versions per entry in tenants/<env>/<tenant>.yaml.
# -----------------------------------------------------------------------------
tenant:
  name: tenant-a            # tenant name (= namespace inside the vCluster)
  environment: dev          # dev | acceptance | prod
  domain: example.local     # base for api.<tenant>.<domain> / web.<tenant>.<domain> hosts

# Version management: version = image tag per app.
applications:
  api:
    version: "latest"       # e.g. "0.10.2" — mccutchen/go-httpbin tag
    image: mccutchen/go-httpbin
    replicas: 1
  web:
    version: "1.27-alpine"  # nginx tag
    image: nginx
    replicas: 1

# Resource governance.
resourceQuota:
  requestsCpu: "2"
  requestsMemory: 4Gi
  limitsCpu: "4"
  limitsMemory: 8Gi
  pods: "20"

# Per-container defaults (LimitRange).
limitRange:
  defaultRequestCpu: 100m
  defaultRequestMemory: 128Mi
  defaultLimitCpu: 500m
  defaultLimitMemory: 512Mi

postgres:
  image: postgres:16-alpine
  database: app
  username: app
  # password: NOT set here. See secretBackend below.
  storage: 1Gi
  storageClassName: ""      # empty = cluster default StorageClass
  # Secret backend:
  #   generated → in-chart Kubernetes Secret (randAlphaNum + lookup). Portable, no deps.
  #   eso       → External Secrets Operator: a per-namespace Password generator
  #               (no external backend; password generated in-cluster, never in Git).
  #               Requires ESO installed INSIDE the vCluster (see applicationsets/eso-appset.yaml).
  secretBackend: generated
  eso:
    passwordLength: 24

# External access. `mode` selects how the apps are exposed.
#   ingress → classic Ingress (needs an ingress controller). Portable fallback.
#   gateway → Gateway API (HTTPRoute) served by a host Gateway controller. The default here; modern,
#             works through vCluster sync.toHost.gatewayApi (Cilium on this homelab).
# TLS terminates at L7 (Ingress or Gateway) via cert-manager — never on a raw L4 LB.
externalAccess:
  # gateway (default): external routing is created HOST-SIDE by charts/tenant-route (Gateway API +
  #   persona split); the chart's own gateway.yaml is an intentional empty stub. This is the live,
  #   documented path and the platform's ApplicationSets set it explicitly.
  # ingress: portable fallback (renders templates/ingress.yaml) for a cluster without Gateway API.
  mode: gateway
  tls:
    enabled: true
    clusterIssuer: cluster-home-ca-issuer   # cert-manager ClusterIssuer (CA-backed)
  ingress:
    className: ""           # e.g. "nginx"; empty = default IngressClass
    # NetworkPolicy allows inbound from this ingress-controller namespace.
    controllerNamespaceLabel: kubernetes.io/metadata.name
    controllerNamespaceValue: ingress-nginx
  gateway:
    className: cilium        # GatewayClass imported from host (sync.fromHost.gatewayClasses)
    sourceCIDR: "0.0.0.0/0"  # NetworkPolicy north-south allow to the app ports

networkPolicy:
  enabled: true

# Placement: pin tenant workloads to specific node(s).
# Default = {} (scheduler free). The tenant runs INSIDE a vCluster whose nodes are NOT the mgmt
# hosts (e.g. regional clusters have host-<region>-* nodes, not srv-t7910), so a hardcoded host
# pin leaves pods Pending. NOTE: an override of nodeSelector to {} does NOT clear a non-empty
# default (Helm merges maps; {} is a no-op) — so the default itself must be empty.
placement:
  nodeSelector: {}
  tolerations: []
