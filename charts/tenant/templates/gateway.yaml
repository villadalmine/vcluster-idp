{{- if eq .Values.externalAccess.mode "gateway" }}
# --- External access (requirement 12): Gateway API mode --------------------
# Modern external access via Gateway API. The tenant Gateway + HTTPRoutes are
# created inside the vCluster and synced to the host (sync.toHost.gatewayApi),
# where the host Gateway controller (Cilium) serves them. The GatewayClass is
# imported from the host (sync.fromHost.gatewayClasses).
#
# TLS (when enabled) terminates at the Gateway: cert-manager's gateway-shim sees
# the `cert-manager.io/cluster-issuer` annotation and issues the cert into the
# Secret referenced by the HTTPS listener. Requires cert-manager Gateway API
# support enabled on the host.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "tenant.name" . }}-gateway
  namespace: {{ include "tenant.name" . }}
  annotations:
    # Wave 4: exposes the apps once deployed.
    argocd.argoproj.io/sync-wave: "4"
    {{- if .Values.externalAccess.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.externalAccess.tls.clusterIssuer }}
    {{- end }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.externalAccess.gateway.className }}
  listeners:
    {{- if .Values.externalAccess.tls.enabled }}
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.{{ include "tenant.name" . }}.{{ .Values.tenant.domain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ include "tenant.name" . }}-tls
      allowedRoutes:
        namespaces:
          from: Same
    {{- else }}
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.{{ include "tenant.name" . }}.{{ .Values.tenant.domain }}"
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "tenant.name" . }}-api-route
  namespace: {{ include "tenant.name" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "tenant.name" . }}-gateway
  hostnames:
    - "api.{{ include "tenant.name" . }}.{{ .Values.tenant.domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "tenant.name" . }}-customer-api
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "tenant.name" . }}-web-route
  namespace: {{ include "tenant.name" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "tenant.name" . }}-gateway
  hostnames:
    - "web.{{ include "tenant.name" . }}.{{ .Values.tenant.domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "tenant.name" . }}-customer-web
          port: 80
{{- end }}
