# Per-container defaults (requirement 6): avoids pods without requests/limits.
apiVersion: v1
kind: LimitRange
metadata:
  name: {{ include "tenant.name" . }}-limits
  namespace: {{ include "tenant.name" . }}
  annotations:
    # Wave 1: per-container defaults before deploying workloads.
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
spec:
  limits:
    - type: Container
      default:
        cpu: {{ .Values.limitRange.defaultLimitCpu }}
        memory: {{ .Values.limitRange.defaultLimitMemory }}
      defaultRequest:
        cpu: {{ .Values.limitRange.defaultRequestCpu }}
        memory: {{ .Values.limitRange.defaultRequestMemory }}
