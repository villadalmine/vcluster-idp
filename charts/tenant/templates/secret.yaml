# --- Secret management (requirement 8) --------------------------------------
# Auto-generated Postgres password: NEVER hardcoded.
# Idempotent pattern: if the Secret already exists, REUSE the password (lookup);
# otherwise generate it with randAlphaNum 24. This prevents every `helm upgrade` /
# Argo sync from regenerating the credential and breaking Postgres.
#
# NOTE (ADR-07): under ArgoCD `lookup` may return empty during dry-run, which can
# cause false drift of the Secret. Production mitigation: ignoreDifferences on the
# data field, or External Secrets Operator / SOPS directly (see ADR-07).
{{- $secretName := printf "%s-postgres" (include "tenant.name" .) }}
{{- $existing := lookup "v1" "Secret" (include "tenant.name" .) $secretName }}
{{- $password := "" }}
{{- if and $existing $existing.data (hasKey $existing.data "password") }}
{{- $password = index $existing.data "password" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 24 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "tenant.name" . }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
  annotations:
    # Under Argo, ignoring the data diff avoids the false drift mentioned above.
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    # Wave 2: the credential exists before Postgres (wave 3) consumes it.
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  username: {{ .Values.postgres.username | quote }}
  database: {{ .Values.postgres.database | quote }}
  password: {{ $password | quote }}
  # DSN ready for the apps to consume via envFrom/secretKeyRef.
  dsn: "postgresql://{{ .Values.postgres.username }}:{{ $password }}@{{ include "tenant.name" . }}-postgres:5432/{{ .Values.postgres.database }}?sslmode=disable"
