# --- Secret management (requirement 8) --------------------------------------
# Two backends, selected by .Values.postgres.secretBackend:
#
#   generated → in-chart Kubernetes Secret. Idempotent pattern: if the Secret
#               already exists, REUSE the password (lookup); otherwise generate it
#               with randAlphaNum 24. Portable, zero dependencies.
#
#   eso       → External Secrets Operator. A per-namespace `Password` generator
#               (no external backend) produces the password IN-CLUSTER; an
#               ExternalSecret materialises the `<tenant>-postgres` Secret from it.
#               The password is generated by ESO and NEVER stored in Git — only the
#               declarative Generator + ExternalSecret are committed. This is the
#               multi-tenant, professional approach (see ADR-07). Requires ESO
#               installed INSIDE the vCluster (applicationsets/eso-appset.yaml).
{{- if eq .Values.postgres.secretBackend "eso" }}
# ── ESO backend ─────────────────────────────────────────────────────────────
# Password generator — namespaced per tenant (multi-tenant: a tenant's generator
# lives in the tenant's own namespace, RBAC-scoped). No external system involved.
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: {{ include "tenant.name" . }}-pg-password
  namespace: {{ include "tenant.name" . }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  length: {{ .Values.postgres.eso.passwordLength }}
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tenant.name" . }}-postgres
  namespace: {{ include "tenant.name" . }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
  annotations:
    # Wave 2: the credential exists before Postgres (wave 3) consumes it.
    argocd.argoproj.io/sync-wave: "2"
spec:
  # refreshInterval 0 = generate ONCE and keep it. A non-zero value would rotate
  # the password on every interval and break the running Postgres.
  refreshInterval: "0"
  target:
    name: {{ include "tenant.name" . }}-postgres
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        username: {{ .Values.postgres.username | quote }}
        database: {{ .Values.postgres.database | quote }}
        # `.password` comes from the Password generator (escaped so Helm passes the
        # ESO Go-template through verbatim).
        password: "{{ `{{ .password }}` }}"
        dsn: "postgresql://{{ .Values.postgres.username }}:{{ `{{ .password }}` }}@{{ include "tenant.name" . }}-postgres:5432/{{ .Values.postgres.database }}?sslmode=disable"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: {{ include "tenant.name" . }}-pg-password
{{- else }}
# ── generated backend (default) ─────────────────────────────────────────────
# NOTE (ADR-07): under ArgoCD `lookup` may return empty during dry-run, which can
# cause false drift of the Secret. Mitigated by ignoreDifferences on /data in the
# tenant-workloads ApplicationSet.
{{- $secretName := printf "%s-postgres" (include "tenant.name" .) }}
{{- $existing := lookup "v1" "Secret" (include "tenant.name" .) $secretName }}
{{- $password := "" }}
{{- if and $existing $existing.data (hasKey $existing.data "password") }}
{{- $password = index $existing.data "password" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 24 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "tenant.name" . }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    # Wave 2: the credential exists before Postgres (wave 3) consumes it.
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  username: {{ .Values.postgres.username | quote }}
  database: {{ .Values.postgres.database | quote }}
  password: {{ $password | quote }}
  dsn: "postgresql://{{ .Values.postgres.username }}:{{ $password }}@{{ include "tenant.name" . }}-postgres:5432/{{ .Values.postgres.database }}?sslmode=disable"
{{- end }}
